<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股回測系統</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{
  --bg:#0a0c10;--bg2:#0f1318;--bg3:#141820;--bg4:#1a2030;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text1:#e8edf5;--text2:#8892a4;--text3:#4a5568;
  --accent:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316;
  --shadow:0 1px 3px rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.3)
}
[data-theme="light"]{
  --bg:#f5f7fa;--bg2:#ffffff;--bg3:#f0f2f5;--bg4:#e8ecf2;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --text1:#111827;--text2:#6b7280;--text3:#9ca3af;
  --accent:#2563eb;--green:#16a34a;--red:#dc2626;--yellow:#d97706;--orange:#ea580c;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 4px 16px rgba(0,0,0,.06)
}
html{font-size:14px}
body{background:var(--bg);color:var(--text1);font-family:"Noto Sans TC",sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Header */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100}
.hdr-inner{max-width:1400px;margin:0 auto;height:52px;display:flex;align-items:center;gap:16px}
.logo{font-family:"IBM Plex Mono",monospace;font-size:14px;font-weight:700;color:var(--text1)}
.logo span{color:var(--accent)}
.hdr-nav{display:flex;gap:4px;margin-left:8px}
.nav-btn{background:none;border:none;color:var(--text3);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:5px 10px;border-radius:4px;cursor:pointer;transition:all .15s}
.nav-btn:hover,.nav-btn.on{background:var(--bg3);color:var(--accent)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-icon{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-icon:hover{color:var(--text1)}
.back-btn{background:none;border:1px solid var(--border);color:var(--text2);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:5px 12px;border-radius:5px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;transition:all .2s}
.back-btn:hover{border-color:var(--border2);color:var(--text1)}

/* Layout */
.layout{max-width:1400px;margin:0 auto;padding:16px;display:grid;grid-template-columns:320px 1fr;gap:14px;align-items:start}
@media(max-width:900px){.layout{grid-template-columns:1fr}}

/* Panel */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.panel-hd{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.panel-body{padding:14px}

/* Form */
.field{margin-bottom:12px}
.field-label{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--text3);margin-bottom:5px;display:block;letter-spacing:.05em}
.field-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text1);font-family:"IBM Plex Mono",monospace;font-size:12px;padding:7px 10px;border-radius:5px;outline:none;transition:border-color .2s}
.field-input:focus{border-color:var(--accent)}
.field-input::placeholder{color:var(--text3)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field-select{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text1);font-family:"IBM Plex Mono",monospace;font-size:12px;padding:7px 10px;border-radius:5px;outline:none;cursor:pointer}
.field-select option{background:var(--bg2)}

/* Checkbox group */
.check-group{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px}
.check-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .15s;font-size:11px;color:var(--text2)}
.check-item:hover{border-color:var(--border2);color:var(--text1)}
.check-item.on{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.07)}
.check-item input{display:none}
.section-hd{font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:8px 0 6px;border-top:1px solid var(--border);margin-top:8px}
.section-hd:first-child{border-top:none;padding-top:0;margin-top:0}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.toggle-label{font-size:12px;color:var(--text1)}
.toggle{width:36px;height:20px;background:var(--bg4);border:1px solid var(--border2);border-radius:10px;position:relative;cursor:pointer;transition:all .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}

/* Buttons */
.btn-run{width:100%;background:var(--accent);color:#fff;border:none;padding:11px;border-radius:6px;font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:8px}
.btn-run:hover{opacity:.9}
.btn-run:disabled{opacity:.4;cursor:not-allowed}
.btn-run.running{background:var(--orange)}
.btn-sm{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:"IBM Plex Mono",monospace;font-size:10px;padding:4px 8px;border-radius:4px;cursor:pointer;transition:all .15s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-demo{width:100%;background:none;border:1px dashed var(--border2);color:var(--text3);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:7px;border-radius:5px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.btn-demo:hover{border-color:var(--accent);color:var(--accent)}

/* Tabs */
.tabs{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:10px 16px;cursor:pointer;transition:all .15s}
.tab:hover{color:var(--text1)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab-pane{display:none;padding:16px}
.tab-pane.on{display:block}

/* Result cards */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
@media(max-width:700px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.stat-label{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--text3);margin-bottom:5px;letter-spacing:.05em}
.stat-val{font-family:"IBM Plex Mono",monospace;font-size:16px;font-weight:600}
.stat-val.pos{color:var(--green)}
.stat-val.neg{color:var(--red)}
.stat-val.neu{color:var(--text1)}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* Chart */
.chart-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:14px}
.chart-title{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--text3);margin-bottom:10px;letter-spacing:.05em}
.chart-area{width:100%;height:220px;position:relative}
canvas.equity-chart{width:100%!important;height:220px!important}

/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:11px}
.data-table th{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--text3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border2);white-space:nowrap;letter-spacing:.05em}
.data-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.data-table tr:last-child td{border:none}
.data-table tr:hover td{background:var(--bg3)}
.badge{font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px}
.badge.buy{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.badge.sell{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.badge.short{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.3)}
.badge.cover{background:rgba(59,130,246,.15);color:var(--accent);border:1px solid rgba(59,130,246,.3)}

/* Empty / Loading */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3);text-align:center;gap:10px}
.empty-icon{font-size:32px;opacity:.3}
.empty-text{font-family:"IBM Plex Mono",monospace;font-size:12px;line-height:1.6}
.progress-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Strategy save */
.strat-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;max-height:160px;overflow-y:auto}
.strat-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;cursor:pointer;transition:all .15s}
.strat-item:hover{border-color:var(--border2)}
.strat-name{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--text1);flex:1}
.strat-stats{font-size:10px;color:var(--text3)}
.strat-del{color:var(--red);font-size:11px;opacity:.6;cursor:pointer;padding:2px 4px}
.strat-del:hover{opacity:1}

/* Optimization */
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.opt-card{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:8px 10px}
.opt-card-title{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--text3);margin-bottom:6px;letter-spacing:.05em}
.opt-status{display:flex;align-items:center;gap:6px;font-size:11px}

/* Today's signal */
.signal-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:14px}
.signal-title{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--text3);letter-spacing:.1em;margin-bottom:8px}
.signal-content{display:flex;align-items:center;gap:10px}
.signal-badge{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:700;padding:6px 14px;border-radius:5px}
.signal-badge.buy-sig{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.4)}
.signal-badge.sell-sig{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.4)}
.signal-badge.hold-sig{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}
.signal-desc{font-size:12px;color:var(--text2);line-height:1.5}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .2s ease both}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="logo">台股<span>.</span>AI <span style="color:var(--text3);font-weight:400">回測系統</span></div>
    <div class="hdr-right">
      <a href="index.html" class="back-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        返回分析
      </a>
      <button class="btn-icon" onclick="toggleTheme()" title="切換主題">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<div class="layout">
  <!-- 左側設定面板 -->
  <div style="display:flex;flex-direction:column;gap:10px">

    <!-- 基本設定 -->
    <div class="panel">
      <div class="panel-hd">
        <span class="panel-title">基本設定</span>
        <button class="btn-sm" onclick="loadDemo()">台積電示範</button>
      </div>
      <div class="panel-body">
        <div class="field">
          <label class="field-label">股票代號</label>
          <input class="field-input" id="stockCode" placeholder="如 2330、0050" value="2330">
        </div>
        <div class="field">
          <label class="field-label">回測區間</label>
          <div class="field-row">
            <input class="field-input" id="startDate" type="date" value="2022-01-01">
            <input class="field-input" id="endDate" type="date">
          </div>
        </div>
        <div class="field">
          <label class="field-label">快速選擇</label>
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            <button class="btn-sm" onclick="setYears(1)">近1年</button>
            <button class="btn-sm" onclick="setYears(2)">近2年</button>
            <button class="btn-sm" onclick="setYears(3)">近3年</button>
            <button class="btn-sm" onclick="setYears(5)">近5年</button>
          </div>
        </div>
        <div class="field">
          <label class="field-label">初始本金（元）</label>
          <input class="field-input" id="capital" type="number" value="1000000">
        </div>
        <div class="field">
          <label class="field-label">交易時間點</label>
          <select class="field-select" id="execType">
            <option value="close">當日收盤價（N）</option>
            <option value="open">隔日開盤價（N+1）</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 交易成本 -->
    <div class="panel">
      <div class="panel-hd"><span class="panel-title">交易成本</span></div>
      <div class="panel-body">
        <div class="toggle-row">
          <span class="toggle-label" style="font-size:12px">自動判斷股票/ETF</span>
          <div class="toggle on" id="autoFeeToggle" onclick="toggleAutoFee()"></div>
        </div>
        <div id="feeCustom" style="display:none">
          <div class="field-row">
            <div class="field">
              <label class="field-label">買入手續費 %</label>
              <input class="field-input" id="buyFee" type="number" step="0.001" value="0.1425">
            </div>
            <div class="field">
              <label class="field-label">賣出手續費+稅 %</label>
              <input class="field-input" id="sellFee" type="number" step="0.001" value="0.4425">
            </div>
          </div>
        </div>
        <div id="feeAuto" style="font-size:11px;color:var(--text3);font-family:IBM Plex Mono,monospace">
          股票：買 0.1425% / 賣 0.4425%<br>
          ETF：買 0.1% / 賣 0.2%
        </div>
      </div>
    </div>

    <!-- 風險管理 -->
    <div class="panel">
      <div class="panel-hd"><span class="panel-title">風險管理</span></div>
      <div class="panel-body">
        <div class="field">
          <label class="field-label">部位計算基準</label>
          <select class="field-select" id="positionBase">
            <option value="initial">初始本金</option>
            <option value="equity">總資金（複利）</option>
          </select>
        </div>
        <div class="field-row">
          <div class="field">
            <label class="field-label">部位大小 %</label>
            <input class="field-input" id="posSize" type="number" value="100">
          </div>
          <div class="field">
            <label class="field-label">停損 %</label>
            <input class="field-input" id="stopLoss" type="number" value="">
          </div>
        </div>
        <div class="field">
          <label class="field-label">停利 %</label>
          <input class="field-input" id="stopProfit" type="number" value="">
        </div>
      </div>
    </div>

    <!-- 做多策略 -->
    <div class="panel">
      <div class="panel-hd"><span class="panel-title">做多策略</span></div>
      <div class="panel-body">
        <div class="section-hd">進場訊號（可多選）</div>
        <div class="check-group" id="longEntryGroup"></div>
        <div class="section-hd">出場訊號（可多選）</div>
        <div class="check-group" id="longExitGroup"></div>
        <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:6px" id="longParams"></div>
      </div>
    </div>

    <!-- 做空策略 -->
    <div class="panel">
      <div class="panel-hd">
        <span class="panel-title">做空策略</span>
        <div class="toggle" id="shortToggle" onclick="toggleShort()"></div>
      </div>
      <div class="panel-body" id="shortBody" style="display:none">
        <div class="section-hd">做空進場訊號</div>
        <div class="check-group" id="shortEntryGroup"></div>
        <div class="section-hd">回補出場訊號</div>
        <div class="check-group" id="shortExitGroup"></div>
      </div>
    </div>

    <!-- 策略管理 -->
    <div class="panel">
      <div class="panel-hd"><span class="panel-title">策略管理</span></div>
      <div class="panel-body">
        <div style="display:flex;gap:6px">
          <input class="field-input" id="stratName" placeholder="策略名稱" style="flex:1">
          <button class="btn-sm" onclick="saveStrategy()">儲存</button>
        </div>
        <div class="strat-list" id="stratList"></div>
      </div>
    </div>

    <!-- 執行 -->
    <button class="btn-run" id="runBtn" onclick="runBacktest()">開始回測</button>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div style="font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--text3);text-align:center;min-height:16px" id="statusText"></div>

  </div>

  <!-- 右側結果 -->
  <div class="panel">
    <div class="tabs" id="resultTabs">
      <button class="tab on" onclick="switchTab(0)">摘要</button>
      <button class="tab" onclick="switchTab(1)">績效分析</button>
      <button class="tab" onclick="switchTab(2)">交易記錄</button>
      <button class="tab" onclick="switchTab(3)">參數優化</button>
      <button class="tab" onclick="switchTab(4)">批量優化</button>
    </div>

    <!-- Tab 0: 摘要 -->
    <div class="tab-pane on" id="tab0">
      <div id="summaryContent">
        <div class="empty">
          <div class="empty-icon">&#x2315;</div>
          <div class="empty-text">設定策略後點擊「開始回測」<br>或點選「台積電示範」快速體驗</div>
        </div>
      </div>
    </div>

    <!-- Tab 1: 績效分析 -->
    <div class="tab-pane" id="tab1">
      <div id="perfContent">
        <div class="empty"><div class="empty-text">尚無回測結果</div></div>
      </div>
    </div>

    <!-- Tab 2: 交易記錄 -->
    <div class="tab-pane" id="tab2">
      <div id="tradesContent">
        <div class="empty"><div class="empty-text">尚無交易記錄</div></div>
      </div>
    </div>

    <!-- Tab 3: 參數優化 -->
    <div class="tab-pane" id="tab3">
      <div style="padding:4px">
        <div class="field">
          <label class="field-label">優化目標</label>
          <select class="field-select" id="optTarget">
            <option value="annReturn">年化報酬率</option>
            <option value="sharpe">夏普比率</option>
            <option value="sortino">索提諾比率</option>
            <option value="maxDD">最小最大回撤</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label">優化參數次數</label>
          <input class="field-input" id="optIter" type="number" value="50">
        </div>
        <button class="btn-run" id="optBtn" onclick="runOptimize()">開始參數優化</button>
        <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" id="optProgress" style="width:0%"></div></div>

// ── 技術指標計算 ──
function calcSMA(data, period) {
  var result = new Array(data.length).fill(null);
  for (var i = period-1; i < data.length; i++) {
    var sum = 0;
    for (var j = i-period+1; j <= i; j++) sum += data[j];
    result[i] = sum / period;
  }
  return result;
}

function calcEMA(data, period) {
  var result = new Array(data.length).fill(null);
  var k = 2 / (period + 1);
  var first = null;
  for (var i = 0; i < data.length; i++) {
    if (data[i] == null) continue;
    if (first == null) {
      if (i >= period - 1) {
        var sum = 0;
        for (var j = i-period+1; j <= i; j++) sum += data[j];
        first = sum / period; result[i] = first;
      }
    } else {
      result[i] = data[i] * k + result[i-1] * (1-k);
    }
  }
  return result;
}

function calcRSI(closes, period) {
  period = period || 14;
  var result = new Array(closes.length).fill(null);
  for (var i = period; i < closes.length; i++) {
    var gains = 0, losses = 0;
    for (var j = i-period+1; j <= i; j++) {
      var diff = closes[j] - closes[j-1];
      if (diff > 0) gains += diff; else losses -= diff;
    }
    var rs = losses === 0 ? 100 : gains / losses;
    result[i] = 100 - 100 / (1 + rs);
  }
  return result;
}

function calcKD(highs, lows, closes, period) {
  period = period || 9;
  var k = new Array(closes.length).fill(null);
  var d = new Array(closes.length).fill(null);
  for (var i = period-1; i < closes.length; i++) {
    var hi = Math.max.apply(null, highs.slice(i-period+1, i+1));
    var lo = Math.min.apply(null, lows.slice(i-period+1, i+1));
    var rsv = hi === lo ? 50 : ((closes[i] - lo) / (hi - lo)) * 100;
    k[i] = i === period-1 ? rsv : k[i-1] * 2/3 + rsv / 3;
    d[i] = i === period-1 ? k[i] : d[i-1] * 2/3 + k[i] / 3;
  }
  return {k: k, d: d};
}

function calcMACD(closes, fast, slow, signal) {
  fast = fast || 12; slow = slow || 26; signal = signal || 9;
  var emaFast = calcEMA(closes, fast);
  var emaSlow = calcEMA(closes, slow);
  var macd = closes.map(function(_,i) { return emaFast[i]!=null && emaSlow[i]!=null ? emaFast[i]-emaSlow[i] : null; });
  var sig = calcEMA(macd.map(function(v){return v||0;}), signal);
  var hist = macd.map(function(v,i) { return v!=null && sig[i]!=null ? v-sig[i] : null; });
  return {macd:macd, signal:sig, hist:hist};
}

function calcBoll(closes, period, stdMult) {
  period = period || 20; stdMult = stdMult || 2;
  var upper = new Array(closes.length).fill(null);
  var mid = calcSMA(closes, period);
  var lower = new Array(closes.length).fill(null);
  for (var i = period-1; i < closes.length; i++) {
    var sl = closes.slice(i-period+1, i+1);
    var mean = sl.reduce(function(a,b){return a+b;},0)/period;
    var variance = sl.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/period;
    var sd = Math.sqrt(variance);
    upper[i] = mean + stdMult * sd;
    lower[i] = mean - stdMult * sd;
  }
  return {upper:upper, mid:mid, lower:lower};
}

function calcWR(highs, lows, closes, period) {
  period = period || 14;
  var result = new Array(closes.length).fill(null);
  for (var i = period-1; i < closes.length; i++) {
    var hi = Math.max.apply(null, highs.slice(i-period+1, i+1));
    var lo = Math.min.apply(null, lows.slice(i-period+1, i+1));
    result[i] = hi === lo ? -50 : ((hi - closes[i]) / (hi - lo)) * -100;
  }
  return result;
}

function calcDonchian(highs, lows, period) {
  period = period || 20;
  var upper = new Array(highs.length).fill(null);
  var lower = new Array(lows.length).fill(null);
  for (var i = period-1; i < highs.length; i++) {
    upper[i] = Math.max.apply(null, highs.slice(i-period+1, i+1));
    lower[i] = Math.min.apply(null, lows.slice(i-period+1, i+1));
  }
  return {upper:upper, lower:lower};
}

// ── 訊號生成 ──
function generateSignals(data, strategies, isShort) {
  var n = data.closes.length;
  var signals = new Array(n).fill(0); // 1=buy/short, -1=sell/cover

  var closes = data.closes, opens = data.opens, highs = data.highs, lows = data.lows, vols = data.volumes;

  // 計算所有指標
  var ma5 = calcSMA(closes, 5), ma10 = calcSMA(closes, 10), ma20 = calcSMA(closes, 20);
  var ma60 = calcSMA(closes, 60);
  var rsi = calcRSI(closes, 14);
  var kd = calcKD(highs, lows, closes, 9);
  var macd = calcMACD(closes, 12, 26, 9);
  var boll = calcBoll(closes, 20, 2);
  var wr = calcWR(highs, lows, closes, 14);
  var dc20 = calcDonchian(highs, lows, 20);
  var vol20 = calcSMA(vols, 20);

  for (var i = 60; i < n; i++) {
    var entryScore = 0, exitScore = 0;
    var entries = strategies.entry || [], exits = strategies.exit || [];

    if (!isShort) {
      // 做多進場
      if (entries.indexOf("ma_golden") >= 0)
        if (ma5[i-1] <= ma20[i-1] && ma5[i] > ma20[i]) entryScore++;
      if (entries.indexOf("price_above_ma") >= 0)
        if (closes[i-1] <= ma20[i-1] && closes[i] > ma20[i]) entryScore++;
      if (entries.indexOf("rsi_oversold") >= 0)
        if (rsi[i-1] < 30 && rsi[i] >= 30) entryScore++;
      if (entries.indexOf("macd_golden") >= 0)
        if (macd.hist[i-1] < 0 && macd.hist[i] >= 0) entryScore++;
      if (entries.indexOf("boll_break") >= 0)
        if (closes[i-1] <= boll.lower[i-1] && closes[i] > boll.lower[i]) entryScore++;
      if (entries.indexOf("kd_golden") >= 0)
        if (kd.k[i-1] <= kd.d[i-1] && kd.k[i] > kd.d[i] && kd.k[i] < 50) entryScore++;
      if (entries.indexOf("vol_surge") >= 0)
        if (vols[i] > vol20[i] * 2 && closes[i] > closes[i-1]) entryScore++;
      if (entries.indexOf("price_high") >= 0 && i >= 20)
        if (closes[i] > Math.max.apply(null, highs.slice(i-20, i))) entryScore++;
      if (entries.indexOf("wr_oversold") >= 0)
        if (wr[i-1] < -80 && wr[i] >= -80) entryScore++;
      if (entries.indexOf("turtle_break") >= 0)
        if (dc20.upper[i-1] && closes[i] > dc20.upper[i-1]) entryScore++;

      // 做多出場
      if (exits.indexOf("ma_death") >= 0)
        if (ma5[i-1] >= ma20[i-1] && ma5[i] < ma20[i]) exitScore++;
      if (exits.indexOf("price_below_ma") >= 0)
        if (closes[i-1] >= ma20[i-1] && closes[i] < ma20[i]) exitScore++;
      if (exits.indexOf("rsi_overbought") >= 0)
        if (rsi[i-1] > 70 && rsi[i] <= 70) exitScore++;
      if (exits.indexOf("macd_death") >= 0)
        if (macd.hist[i-1] > 0 && macd.hist[i] <= 0) exitScore++;
      if (exits.indexOf("boll_reverse") >= 0)
        if (closes[i-1] >= boll.upper[i-1] && closes[i] < boll.upper[i]) exitScore++;
      if (exits.indexOf("kd_death") >= 0)
        if (kd.k[i-1] >= kd.d[i-1] && kd.k[i] < kd.d[i] && kd.k[i] > 50) exitScore++;
      if (exits.indexOf("price_low") >= 0 && i >= 20)
        if (closes[i] < Math.min.apply(null, lows.slice(i-20, i))) exitScore++;
      if (exits.indexOf("wr_overbought") >= 0)
        if (wr[i-1] > -20 && wr[i] <= -20) exitScore++;
      if (exits.indexOf("turtle_stop") >= 0 && i >= 10)
        if (closes[i] < Math.min.apply(null, lows.slice(i-10, i))) exitScore++;

      if (entryScore > 0 && exitScore === 0) signals[i] = 1;
      else if (exitScore > 0) signals[i] = -1;
    } else {
      // 做空邏輯（鏡像）
      if (entries.indexOf("s_ma_death") >= 0)
        if (ma5[i-1] >= ma20[i-1] && ma5[i] < ma20[i]) entryScore++;
      if (entries.indexOf("s_rsi_overbought") >= 0)
        if (rsi[i-1] > 70 && rsi[i] <= 70) entryScore++;
      if (entries.indexOf("s_macd_death") >= 0)
        if (macd.hist[i-1] > 0 && macd.hist[i] <= 0) entryScore++;
      if (entries.indexOf("s_kd_death") >= 0)
        if (kd.k[i-1] >= kd.d[i-1] && kd.k[i] < kd.d[i]) entryScore++;
      if (exits.indexOf("s_ma_golden") >= 0)
        if (ma5[i-1] <= ma20[i-1] && ma5[i] > ma20[i]) exitScore++;
      if (exits.indexOf("s_rsi_oversold") >= 0)
        if (rsi[i-1] < 30 && rsi[i] >= 30) exitScore++;
      if (entryScore > 0 && exitScore === 0) signals[i] = 1;
      else if (exitScore > 0) signals[i] = -1;
    }
  }
  return signals;
}

// ── 回測核心 ──
function backtest(data, config) {
  var closes = data.closes, opens = data.opens;
  var n = closes.length;
  var capital = config.capital;
  var initCapital = capital;
  var posBase = config.positionBase;
  var posSize = config.posSize / 100;
  var stopLoss = config.stopLoss ? config.stopLoss / 100 : null;
  var stopProfit = config.stopProfit ? config.stopProfit / 100 : null;
  var buyFee = config.buyFee / 100;
  var sellFee = config.sellFee / 100;
  var execType = config.execType;

  var longSignals = generateSignals(data, {entry: config.longEntry, exit: config.longExit}, false);
  var shortSignals = config.shortEnabled ? generateSignals(data, {entry: config.shortEntry, exit: config.shortExit}, true) : new Array(n).fill(0);

  var equity = [capital];
  var position = 0; // 張數
  var entryPrice = 0;
  var posType = null; // 'long' | 'short'
  var trades = [];
  var cash = capital;
  var trailingHigh = 0;

  for (var i = 1; i < n; i++) {
    var price = execType === "open" ? (opens[i] || closes[i]) : closes[i];
    var prevPrice = execType === "open" ? (opens[i-1] || closes[i-1]) : closes[i-1];

    // 停損停利檢查
    if (position > 0 && posType === "long") {
      var pnl = (price - entryPrice) / entryPrice;
      if (stopLoss && pnl <= -stopLoss) {
        var proceeds = position * 1000 * price * (1 - sellFee);
        cash += proceeds;
        trades.push({date:data.dates[i], type:"賣出(停損)", price:price, shares:position, pnl:proceeds - position*1000*entryPrice*(1+buyFee), pnlPct:(pnl*100).toFixed(2)+"%"});
        position = 0; posType = null;
      } else if (stopProfit && pnl >= stopProfit) {
        var proceeds = position * 1000 * price * (1 - sellFee);
        cash += proceeds;
        trades.push({date:data.dates[i], type:"賣出(停利)", price:price, shares:position, pnl:proceeds - position*1000*entryPrice*(1+buyFee), pnlPct:(pnl*100).toFixed(2)+"%"});
        position = 0; posType = null;
      }
      // 移動停損
      if (longSignals[i-1] !== -1 && price > trailingHigh) trailingHigh = price;
      if (config.longExit.indexOf("trailing_stop") >= 0 && trailingHigh > 0 && price < trailingHigh * 0.95) {
        var proceeds = position * 1000 * price * (1 - sellFee);
        cash += proceeds;
        trades.push({date:data.dates[i], type:"賣出(移停)", price:price, shares:position, pnl:proceeds - position*1000*entryPrice*(1+buyFee), pnlPct:((price-entryPrice)/entryPrice*100).toFixed(2)+"%"});
        position = 0; posType = null; trailingHigh = 0;
      }
    }

    // 根據訊號交易
    if (position === 0) {
      // 做多進場
      if (longSignals[i] === 1) {
        var base = posBase === "equity" ? cash : initCapital;
        var invest = base * posSize;
        var lots = Math.floor(invest / (price * 1000));
        if (lots > 0) {
          var cost = lots * 1000 * price * (1 + buyFee);
          if (cost <= cash) {
            cash -= cost;
            position = lots; posType = "long"; entryPrice = price; trailingHigh = price;
            trades.push({date:data.dates[i], type:"買入", price:price, shares:lots, pnl:null, pnlPct:null});
          }
        }
      }
      // 做空進場
      else if (config.shortEnabled && shortSignals[i] === 1) {
        var base = posBase === "equity" ? cash : initCapital;
        var lots = Math.floor(base * posSize / (price * 1000));
        if (lots > 0) {
          position = -lots; posType = "short"; entryPrice = price;
          trades.push({date:data.dates[i], type:"放空", price:price, shares:lots, pnl:null, pnlPct:null});
        }
      }
    } else if (position > 0 && posType === "long") {
      // 做多出場
      if (longSignals[i] === -1) {
        var proceeds = position * 1000 * price * (1 - sellFee);
        var pnlAmt = proceeds - position*1000*entryPrice*(1+buyFee);
        cash += proceeds;
        trades.push({date:data.dates[i], type:"賣出", price:price, shares:position, pnl:pnlAmt, pnlPct:((price-entryPrice)/entryPrice*100).toFixed(2)+"%"});
        position = 0; posType = null; trailingHigh = 0;
      }
    } else if (position < 0 && posType === "short") {
      // 回補出場
      if (shortSignals[i] === -1) {
        var lots = Math.abs(position);
        var cost = lots * 1000 * price * (1 + sellFee);
        var pnlAmt = lots * 1000 * (entryPrice - price) - cost * sellFee;
        cash += pnlAmt;
        trades.push({date:data.dates[i], type:"回補", price:price, shares:lots, pnl:pnlAmt, pnlPct:((entryPrice-price)/entryPrice*100).toFixed(2)+"%"});
        position = 0; posType = null;
      }
    }

    // 計算淨值
    var holdingVal = position > 0 ? position * 1000 * price : (position < 0 ? Math.abs(position) * 1000 * (2*entryPrice - price) : 0);
    equity.push(cash + holdingVal);
  }

  // 計算績效
  var finalEquity = equity[equity.length-1];
  var totalReturn = (finalEquity - initCapital) / initCapital;
  var days = n;
  var years = days / 252;
  var annReturn = Math.pow(1 + totalReturn, 1/years) - 1;

  // 計算最大回撤
  var peak = equity[0], maxDD = 0;
  for (var i = 1; i < equity.length; i++) {
    if (equity[i] > peak) peak = equity[i];
    var dd = (peak - equity[i]) / peak;
    if (dd > maxDD) maxDD = dd;
  }

  // 計算夏普
  var daily = [];
  for (var i = 1; i < equity.length; i++) daily.push((equity[i]-equity[i-1])/equity[i-1]);
  var avgDaily = daily.reduce(function(a,b){return a+b;},0)/daily.length;
  var stdDaily = Math.sqrt(daily.reduce(function(a,b){return a+Math.pow(b-avgDaily,2);},0)/daily.length);
  var sharpe = stdDaily > 0 ? (avgDaily * Math.sqrt(252)) / stdDaily : 0;

  // 索提諾（只看負報酬）
  var downside = daily.filter(function(r){return r<0;});
  var downStd = downside.length > 0 ? Math.sqrt(downside.reduce(function(a,b){return a+b*b;},0)/downside.length) * Math.sqrt(252) : 0.001;
  var sortino = annReturn / downStd;

  // 交易統計
  var closedTrades = trades.filter(function(t){return t.pnl!=null;});
  var winTrades = closedTrades.filter(function(t){return t.pnl>0;});
  var loseTrades = closedTrades.filter(function(t){return t.pnl<=0;});
  var winRate = closedTrades.length > 0 ? winTrades.length / closedTrades.length : 0;
  var avgWin = winTrades.length > 0 ? winTrades.reduce(function(a,t){return a+t.pnl;},0)/winTrades.length : 0;
  var avgLoss = loseTrades.length > 0 ? loseTrades.reduce(function(a,t){return a+t.pnl;},0)/loseTrades.length : 0;

  // 連勝連敗
  var maxWinStreak = 0, maxLoseStreak = 0, curWin = 0, curLose = 0;
  closedTrades.forEach(function(t){
    if(t.pnl>0){curWin++;curLose=0;if(curWin>maxWinStreak)maxWinStreak=curWin;}
    else{curLose++;curWin=0;if(curLose>maxLoseStreak)maxLoseStreak=curLose;}
  });

  return {
    equity: equity,
    trades: trades,
    stats: {
      totalReturn: totalReturn,
      annReturn: annReturn,
      sharpe: sharpe,
      sortino: sortino,
      maxDD: maxDD,
      tradeCount: closedTrades.length,
      winRate: winRate,
      avgWin: avgWin,
      avgLoss: avgLoss,
      maxWinStreak: maxWinStreak,
      maxLoseStreak: maxLoseStreak,
      finalEquity: finalEquity,
      initCapital: initCapital
    }
  };
}

// ── 資料抓取 ──
async function fetchStockData(code, startDate, endDate) {
  var token = "";
  try {
    // 先試從 Render 後端抓（已有 FinMind 整合）
    var resp = await fetch(RENDER_URL + "/history?code=" + code + "&start=" + startDate + "&end=" + endDate);
    if (resp.ok) {
      var d = await resp.json();
      if (d && d.dates && d.dates.length > 0) return d;
    }
  } catch(e) {}

  // 直接呼叫 FinMind
  try {
    var url = "https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=" + code + "&start_date=" + startDate + "&end_date=" + endDate;
    var r = await fetch(url, {headers: {"User-Agent": "Mozilla/5.0"}});
    var data = await r.json();
    var rows = data.data || [];
    if (!rows.length) throw new Error("無資料");
    rows.sort(function(a,b){return a.date.localeCompare(b.date);});
    return {
      dates: rows.map(function(r){return r.date;}),
      opens:  rows.map(function(r){return parseFloat(r.open)||0;}),
      highs:  rows.map(function(r){return parseFloat(r.max)||0;}),
      lows:   rows.map(function(r){return parseFloat(r.min)||0;}),
      closes: rows.map(function(r){return parseFloat(r.close)||0;}),
      volumes:rows.map(function(r){return parseInt(r.Trading_Volume)||0;}),
    };
  } catch(e) { throw new Error("無法取得資料：" + e.message); }
}

// ── 圖表繪製 ──
function drawChart(dates, equity, initCapital) {
  var canvas = document.getElementById("equityChart");
  if (!canvas) return;
  var ctx = canvas.getContext("2d");
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = 220 * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  var w = canvas.offsetWidth, h = 220;
  var isDark = document.documentElement.getAttribute("data-theme") === "dark";
  var bg = isDark ? "#141820" : "#f0f2f5";
  var lineColor = isDark ? "#3b82f6" : "#2563eb";
  var baseColor = isDark ? "rgba(59,130,246,.15)" : "rgba(37,99,235,.1)";
  var textColor = isDark ? "#4a5568" : "#9ca3af";
  var gridColor = isDark ? "rgba(255,255,255,.05)" : "rgba(0,0,0,.05)";

  ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);

  var pad = {top:10, right:20, bottom:30, left:70};
  var cw = w - pad.left - pad.right;
  var ch = h - pad.top - pad.bottom;

  var minE = Math.min.apply(null, equity);
  var maxE = Math.max.apply(null, equity);
  var range = maxE - minE || 1;
  minE -= range * 0.05; maxE += range * 0.05;

  function xp(i) { return pad.left + (i / (equity.length-1)) * cw; }
  function yp(v) { return pad.top + (1 - (v - minE) / (maxE - minE)) * ch; }

  // Grid
  ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
  for (var g = 0; g <= 4; g++) {
    var gy = pad.top + g * ch / 4;
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(pad.left+cw, gy); ctx.stroke();
    var val = maxE - g * (maxE-minE) / 4;
    ctx.fillStyle = textColor; ctx.font = "10px IBM Plex Mono";
    ctx.textAlign = "right"; ctx.fillText(formatNum(val), pad.left-5, gy+4);
  }

  // Baseline (initial capital)
  ctx.strokeStyle = "rgba(150,150,150,.3)"; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(pad.left, yp(initCapital)); ctx.lineTo(pad.left+cw, yp(initCapital)); ctx.stroke();
  ctx.setLineDash([]);

  // Fill
  ctx.beginPath();
  ctx.moveTo(xp(0), yp(equity[0]));
  equity.forEach(function(v,i){ ctx.lineTo(xp(i), yp(v)); });
  ctx.lineTo(xp(equity.length-1), pad.top+ch);
  ctx.lineTo(xp(0), pad.top+ch);
  ctx.closePath();
  ctx.fillStyle = baseColor; ctx.fill();

  // Line
  ctx.beginPath(); ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5;
  equity.forEach(function(v,i){ i===0 ? ctx.moveTo(xp(0),yp(v)) : ctx.lineTo(xp(i),yp(v)); });
  ctx.stroke();

  // X labels
  ctx.fillStyle = textColor; ctx.font = "10px IBM Plex Mono"; ctx.textAlign = "center";
  var step = Math.floor(dates.length / 5);
  for (var xi = 0; xi < dates.length; xi += step) {
    ctx.fillText(dates[xi].slice(0,7), xp(xi), h-10);
  }
}

function formatNum(n) {
  if (Math.abs(n) >= 1000000) return (n/1000000).toFixed(2) + "M";
  if (Math.abs(n) >= 1000) return (n/1000).toFixed(0) + "K";
  return n.toFixed(0);
}

function fmtPct(v) { return (v >= 0 ? "+" : "") + (v*100).toFixed(2) + "%"; }
function fmtMoney(v) { return v >= 0 ? "+" + Math.round(v).toLocaleString() : Math.round(v).toLocaleString(); }

var isRunning = false;
window._lastConfig = null;
window._lastData = null;

async function runBacktest() {
  if (isRunning) return;
  isRunning = true;

  var btn = document.getElementById("runBtn");
  btn.disabled = true; btn.textContent = "回測中..."; btn.classList.add("running");

  var code = document.getElementById("stockCode").value.trim();
  var startDate = document.getElementById("startDate").value;
  var endDate = document.getElementById("endDate").value;

  var execType = document.getElementById("execType").value;
  var posBase = document.getElementById("positionBase").value;
  var posSize = parseFloat(document.getElementById("posSize").value) || 100;
  var stopLoss = parseFloat(document.getElementById("stopLoss").value) || 0;
  var stopProfit = parseFloat(document.getElementById("stopProfit").value) || 0;

  var isETF = code.startsWith("00");
  var buyFee = autoFee ? (isETF ? 0.1 : 0.1425) : parseFloat(document.getElementById("buyFee").value);
  var sellFee = autoFee ? (isETF ? 0.2 : 0.4425) : parseFloat(document.getElementById("sellFee").value);

  var longEntry = getSelected("longEntryGroup");
  var longExit = getSelected("longExitGroup");
  var shortEntry = shortEnabled ? getSelected("shortEntryGroup") : [];
  var shortExit = shortEnabled ? getSelected("shortExitGroup") : [];

  if (!code) { alert("請輸入股票代號"); isRunning=false; btn.disabled=false; btn.textContent="開始回測"; btn.classList.remove("running"); return; }
  if (!longEntry.length) { alert("請至少選一個做多進場策略"); isRunning=false; btn.disabled=false; btn.textContent="開始回測"; btn.classList.remove("running"); return; }

  var config = {
    capital, execType, posBase, posSize, stopLoss, stopProfit,
    buyFee, sellFee, longEntry, longExit,
    shortEnabled, shortEntry, shortExit
  };
  window._lastConfig = config;

  try {
    document.getElementById("progressFill").style.width = "30%";
    var data = await fetchStockData(code, startDate, endDate);
    window._lastData = data;
    document.getElementById("statusText").textContent = "計算技術指標與訊號...";
    document.getElementById("progressFill").style.width = "60%";

    setTimeout(function() {
      try {
        var result = backtest(data, config);
        document.getElementById("progressFill").style.width = "100%";
        document.getElementById("statusText").textContent = "回測完成 — " + data.dates.length + " 個交易日，" + result.stats.tradeCount + " 筆交易";
        showResults(result, data, code);
        switchTab(0);
        window._lastResult = result;
      } catch(e) {
        document.getElementById("statusText").textContent = "錯誤：" + e.message;
      }
      isRunning = false;
      btn.disabled = false; btn.textContent = "開始回測"; btn.classList.remove("running");
    }, 100);

  } catch(e) {
    document.getElementById("statusText").textContent = "錯誤：" + e.message;
    isRunning = false; btn.disabled = false; btn.textContent = "開始回測"; btn.classList.remove("running");
  }
}

// ── 參數優化 ──
async function runOptimize() {
  if (!window._lastData) { alert("請先執行回測"); return; }
  var btn = document.getElementById("optBtn");
  btn.disabled = true; btn.textContent = "優化中...";
  document.getElementById("optProgress").style.width = "0%";
  document.getElementById("optStatus").textContent = "開始優化...";

  var target = document.getElementById("optTarget").value;
  var iters = parseInt(document.getElementById("optIter").value) || 50;
  var data = window._lastData;
  var config = Object.assign({}, window._lastConfig);

  var paramSets = [
    {stopLoss: 5, stopProfit: 15},
    {stopLoss: 8, stopProfit: 20},
    {stopLoss: 10, stopProfit: 25},
    {stopLoss: 12, stopProfit: 30},
    {stopLoss: 15, stopProfit: 40},
    {stopLoss: 6, stopProfit: 18},
    {stopLoss: 7, stopProfit: 21},
    {stopLoss: 9, stopProfit: 27},
    {stopLoss: 0, stopProfit: 20},
    {stopLoss: 0, stopProfit: 30}
  ];

  var results = [];
  var total = Math.min(iters, paramSets.length * 5);

  for (var i = 0; i < Math.min(iters, paramSets.length); i++) {
    var p = paramSets[i % paramSets.length];
    var c = Object.assign({}, config, p);
    try {
      var r = backtest(data, c);
      var score = target === "annReturn" ? r.stats.annReturn :
                  target === "sharpe" ? r.stats.sharpe :
                  target === "sortino" ? r.stats.sortino :
                  -r.stats.maxDD;
      results.push({params: p, stats: r.stats, score: score});
    } catch(e) {}
    document.getElementById("optProgress").style.width = ((i+1)/Math.min(iters,paramSets.length)*100).toFixed(0) + "%";
    document.getElementById("optStatus").textContent = "已測試 " + (i+1) + " 組參數...";
    await new Promise(function(r){setTimeout(r,50);}); // yield UI
  }

  results.sort(function(a,b){return b.score-a.score;});
  var best = results[0];

  var html = '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px">'
    + '<div style="font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--green);margin-bottom:8px">最佳參數</div>'
    + '<div style="font-size:12px;color:var(--text1)">停損：' + (best.params.stopLoss||"無") + '% | 停利：' + (best.params.stopProfit||"無") + '%</div>'
    + '<div style="font-size:12px;color:var(--text2);margin-top:4px">年化報酬：' + fmtPct(best.stats.annReturn) + ' | 夏普：' + best.stats.sharpe.toFixed(2) + ' | 最大回撤：' + fmtPct(-best.stats.maxDD) + '</div>'
    + '</div>'
    + '<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>排名</th><th>停損%</th><th>停利%</th><th>年化報酬</th><th>夏普</th><th>最大回撤</th><th>勝率</th></tr></thead><tbody>'
    + results.slice(0,10).map(function(r,i){
        return '<tr><td>' + (i+1) + '</td><td>' + (r.params.stopLoss||"—") + '</td><td>' + (r.params.stopProfit||"—") + '</td>'
          + '<td style="color:' + (r.stats.annReturn>=0?"var(--green)":"var(--red)") + '">' + fmtPct(r.stats.annReturn) + '</td>'
          + '<td>' + r.stats.sharpe.toFixed(2) + '</td>'
          + '<td style="color:var(--red)">' + fmtPct(-r.stats.maxDD) + '</td>'
          + '<td>' + (r.stats.winRate*100).toFixed(1) + '%</td></tr>';
      }).join("")
    + '</tbody></table></div>';

  document.getElementById("optResult").innerHTML = html;
  document.getElementById("optStatus").textContent = "優化完成，共測試 " + results.length + " 組";
  btn.disabled = false; btn.textContent = "開始參數優化";
}

// ── 批量優化 ──
var batchRunning = false;
async function runBatchOpt() {

  batchRunning = true;

  var entries = getSelected("batchEntryGroup");
  var exits = getSelected("batchExitGroup");
  if (!entries.length || !exits.length) { alert("請選擇買入和賣出策略"); batchRunning=false; btn.disabled=false; btn.textContent="開始批量優化"; return; }

  var target = document.getElementById("batchTarget").value;
  var iters = parseInt(document.getElementById("batchIter").value) || 30;
  var data = window._lastData;
  var config = Object.assign({}, window._lastConfig);
  var results = [];
  var combos = [];

  entries.forEach(function(e){ exits.forEach(function(x){ combos.push({entry:[e], exit:[x]}); }); });
  var total = Math.min(combos.length, iters);

  for (var i = 0; i < total; i++) {
    if (!batchRunning) break;
    var c = combos[i];
    var cfg = Object.assign({}, config, {longEntry: c.entry, longExit: c.exit});
    try {
      var r = backtest(data, cfg);
      var score = target === "annReturn" ? r.stats.annReturn : target === "sharpe" ? r.stats.sharpe : r.stats.sortino;
      results.push({entry: c.entry[0], exit: c.exit[0], stats: r.stats, score: score});
    } catch(e) {}
    document.getElementById("batchProgress").style.width = ((i+1)/total*100).toFixed(0) + "%";
    document.getElementById("batchStatus").textContent = (i+1) + "/" + total + " 組完成";
    if (i % 5 === 0) await new Promise(function(r){setTimeout(r,10);});
  }

  results.sort(function(a,b){return b.score-a.score;});
  var html = '<table class="data-table"><thead><tr><th>排名</th><th>買入策略</th><th>賣出策略</th><th>年化報酬</th><th>夏普</th><th>最大回撤</th><th>交易次數</th></tr></thead><tbody>'
    + results.slice(0,20).map(function(r,i){
        return '<tr><td>' + (i+1) + '</td>'
          + '<td>' + r.entry.replace(/_/g," ") + '</td>'
          + '<td>' + r.exit.replace(/_/g," ") + '</td>'
          + '<td style="color:' + (r.stats.annReturn>=0?"var(--green)":"var(--red)") + '">' + fmtPct(r.stats.annReturn) + '</td>'
          + '<td>' + r.stats.sharpe.toFixed(2) + '</td>'
          + '<td style="color:var(--red)">' + fmtPct(-r.stats.maxDD) + '</td>'
          + '<td>' + r.stats.tradeCount + '</td></tr>';
      }).join("") + '</tbody></table>';
  document.getElementById("batchResult").innerHTML = html;
  document.getElementById("batchStatus").textContent = "批量優化完成，共 " + results.length + " 組";
  batchRunning = false; btn.disabled = false; btn.textContent = "開始批量優化";
}
function stopBatch() { batchRunning = false; document.getElementById("batchStatus").textContent = "已停止"; }

// ── 策略管理 ──
function saveStrategy() {
  var name = document.getElementById("stratName").value.trim();
  if (!name) { alert("請輸入策略名稱"); return; }
  var strategies = JSON.parse(localStorage.getItem("bt_strategies") || "[]");
  var entry = {
    name: name,
    code: document.getElementById("stockCode").value,
    startDate: document.getElementById("startDate").value,
    endDate: document.getElementById("endDate").value,
    capital: document.getElementById("capital").value,
    execType: document.getElementById("execType").value,
    posSize: document.getElementById("posSize").value,
    stopLoss: document.getElementById("stopLoss").value,
    stopProfit: document.getElementById("stopProfit").value,
    longEntry: getSelected("longEntryGroup"),
    longExit: getSelected("longExitGroup"),
    shortEnabled: shortEnabled,
    annReturn: window._lastResult ? fmtPct(window._lastResult.stats.annReturn) : "—",
    sharpe: window._lastResult ? window._lastResult.stats.sharpe.toFixed(2) : "—",
    savedAt: new Date().toLocaleDateString("zh-TW")
  };
  var idx = strategies.findIndex(function(s){return s.name===name;});
  if (idx >= 0) strategies[idx] = entry; else strategies.push(entry);
  localStorage.setItem("bt_strategies", JSON.stringify(strategies));
  document.getElementById("stratName").value = "";
  loadStrategyList();
}

function loadStrategyList() {
  var strategies = JSON.parse(localStorage.getItem("bt_strategies") || "[]");
  var list = document.getElementById("stratList");
  list.innerHTML = "";
  if (!strategies.length) { list.innerHTML = '<div style="font-size:11px;color:var(--text3);text-align:center;padding:10px">尚無儲存策略</div>'; return; }
  strategies.forEach(function(s) {
    var item = document.createElement("div"); item.className = "strat-item";
    item.innerHTML = '<div><div class="strat-name">' + s.name + '</div><div class="strat-stats">' + s.code + ' | ' + s.annReturn + ' | 夏普 ' + s.sharpe + '</div></div>'
      + '<span class="strat-del" data-name="' + s.name + '">✕</span>';
    item.onclick = function(e) {
      if (e.target.classList.contains("strat-del")) {
        deleteStrategy(e.target.dataset.name);
      } else {
        loadStrategy(s);
      }
    };
    list.appendChild(item);
  });
}

function loadStrategy(s) {
  document.getElementById("stockCode").value = s.code || "";
  document.getElementById("startDate").value = s.startDate || "";
  document.getElementById("endDate").value = s.endDate || "";
  document.getElementById("capital").value = s.capital || 1000000;
  document.getElementById("execType").value = s.execType || "close";
  document.getElementById("posSize").value = s.posSize || 100;
  document.getElementById("stopLoss").value = s.stopLoss || "";
  document.getElementById("stopProfit").value = s.stopProfit || "";
  clearAll("longEntryGroup"); clearAll("longExitGroup");
  (s.longEntry||[]).forEach(function(id){ var cb=document.querySelector("#longEntryGroup input[value='"+id+"']"); if(cb){cb.checked=true;cb.closest(".check-item").classList.add("on");} });
  (s.longExit||[]).forEach(function(id){ var cb=document.querySelector("#longExitGroup input[value='"+id+"']"); if(cb){cb.checked=true;cb.closest(".check-item").classList.add("on");} });
}

function deleteStrategy(name) {
  var strategies = JSON.parse(localStorage.getItem("bt_strategies") || "[]");
  strategies = strategies.filter(function(s){return s.name!==name;});
  localStorage.setItem("bt_strategies", JSON.stringify(strategies));
  loadStrategyList();
}

loadStrategyList();
</script>
