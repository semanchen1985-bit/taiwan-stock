<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股回測系統 v4.0</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{--bg:#0a0c10;--bg2:#0f1318;--bg3:#141820;--bg4:#1a2030;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text1:#e8edf5;--text2:#8892a4;--text3:#4a5568;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316;--shadow:0 1px 3px rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.3)}
[data-theme="light"]{--bg:#f5f7fa;--bg2:#ffffff;--bg3:#f0f2f5;--bg4:#e8ecf2;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);--text1:#111827;--text2:#6b7280;--text3:#9ca3af;--accent:#2563eb;--green:#16a34a;--red:#dc2626;--yellow:#d97706;--orange:#ea580c;--shadow:0 1px 3px rgba(0,0,0,.1),0 4px 16px rgba(0,0,0,.06)}
html{font-size:14px}body{background:var(--bg);color:var(--text1);font-family:"Noto Sans TC",sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100}
.hdr-inner{max-width:1400px;margin:0 auto;height:52px;display:flex;align-items:center;gap:12px}
.logo{font-family:"IBM Plex Mono",monospace;font-size:14px;font-weight:700;color:var(--text1)}.logo span{color:var(--accent)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-icon{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}.btn-icon:hover{color:var(--text1)}
.back-btn{background:none;border:1px solid var(--border);color:var(--text2);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:5px 12px;border-radius:5px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;transition:all .2s}.back-btn:hover{border-color:var(--border2);color:var(--text1)}
.layout{max-width:1400px;margin:0 auto;padding:16px;display:grid;grid-template-columns:300px 1fr;gap:14px;align-items:start}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px}
.panel-hd{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}
.panel-title{font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.panel-body{padding:12px}
.field{margin-bottom:10px}.field-label{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--text3);margin-bottom:4px;display:block;letter-spacing:.05em}
.field-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text1);font-family:"IBM Plex Mono",monospace;font-size:12px;padding:6px 10px;border-radius:5px;outline:none;transition:border-color .2s}.field-input:focus{border-color:var(--accent)}.field-input::placeholder{color:var(--text3)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field-select{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text1);font-family:"IBM Plex Mono",monospace;font-size:12px;padding:6px 10px;border-radius:5px;outline:none;cursor:pointer}.field-select option{background:var(--bg2)}
.check-item{display:flex;align-items:center;gap:5px;padding:4px 7px;border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .15s;font-size:11px;color:var(--text2)}.check-item:hover{border-color:var(--border2);color:var(--text1)}.check-item.on{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.07)}.check-item input{display:none}
.section-hd{font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:8px 0 5px;border-top:1px solid var(--border);margin-top:8px}.section-hd:first-child{border-top:none;padding-top:0;margin-top:0}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.toggle{width:34px;height:18px;background:var(--bg4);border:1px solid var(--border2);border-radius:9px;position:relative;cursor:pointer;transition:all .2s;flex-shrink:0}.toggle.on{background:var(--accent)}.toggle::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:transform .2s}.toggle.on::after{transform:translateX(16px)}
.btn-run{width:100%;background:var(--accent);color:#fff;border:none;padding:10px;border-radius:6px;font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:6px}.btn-run:hover{opacity:.9}.btn-run:disabled{opacity:.4;cursor:not-allowed}.btn-run.running{background:var(--orange)}
.btn-sm{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:"IBM Plex Mono",monospace;font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer;transition:all .15s}.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.tabs{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:10px 14px;cursor:pointer;transition:all .15s}.tab:hover{color:var(--text1)}.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab-pane{display:none;padding:14px}.tab-pane.on{display:block}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}@media(max-width:700px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px}.stat-label{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--text3);margin-bottom:5px;letter-spacing:.05em}.stat-val{font-family:"IBM Plex Mono",monospace;font-size:16px;font-weight:600}.stat-val.pos{color:var(--green)}.stat-val.neg{color:var(--red)}.stat-val.neu{color:var(--text1)}
.chart-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:12px}.chart-title{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--text3);margin-bottom:8px;letter-spacing:.05em}
.data-table{width:100%;border-collapse:collapse;font-size:11px}.data-table th{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--text3);text-align:left;padding:5px 8px;border-bottom:1px solid var(--border2);white-space:nowrap;letter-spacing:.05em}.data-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}.data-table tr:last-child td{border:none}.data-table tr:hover td{background:var(--bg3)}
.badge{font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px}.badge.buy{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}.badge.sell{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}.badge.short{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.3)}.badge.cover{background:rgba(59,130,246,.15);color:var(--accent);border:1px solid rgba(59,130,246,.3)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3);text-align:center;gap:10px}.empty-text{font-family:"IBM Plex Mono",monospace;font-size:12px;line-height:1.6}
.progress-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:6px}.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.strat-list{display:flex;flex-direction:column;gap:5px;margin-top:8px;max-height:150px;overflow-y:auto}
.strat-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;cursor:pointer;transition:all .15s}.strat-item:hover{border-color:var(--border2)}
.strat-name{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--text1);flex:1}.strat-stats{font-size:10px;color:var(--text3)}
.strat-del{color:var(--red);font-size:11px;opacity:.6;cursor:pointer;padding:2px 5px;border:none;background:none;flex-shrink:0}.strat-del:hover{opacity:1}
.signal-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:12px}.signal-title{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--text3);letter-spacing:.1em;margin-bottom:8px}
.signal-badge{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:700;padding:5px 14px;border-radius:5px;display:inline-block}
.signal-badge.buy-sig{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.4)}.signal-badge.sell-sig{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.4)}.signal-badge.hold-sig{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}
.export-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.worker-badge{font-family:"IBM Plex Mono",monospace;font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid rgba(34,197,94,.3);color:var(--green);background:rgba(34,197,94,.07)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fade-up{animation:fadeUp .2s ease both}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--text1)}

/* ── 策略參數列 ───────────────────────────────────────── */

/* check-group 改用 flex wrap，每格佔一半 */
.check-group{
  display:flex;
  flex-wrap:wrap;
  gap:3px;
  margin-top:4px;
}

/* wrapper 預設佔一格（約 50%）*/
.strat-param-wrap{
  width:calc(50% - 2px);
  display:flex;
  flex-direction:column;
  min-width:0;
}

/* 有展開參數時佔整行 */
.strat-param-wrap.has-params-open{
  width:100%;
}

/* check-item 填滿 wrapper */
.check-group .check-item{
  width:100%;
  box-sizing:border-box;
}

/* 參數列 */
.param-row{
  display:none;       /* JS 控制顯示 */
  flex-direction:column;
  gap:4px;
  padding:6px 8px 8px;
  background:var(--bg4);
  border:1px solid var(--border2);
  border-top:none;
  border-radius:0 0 5px 5px;
  margin-bottom:1px;
}
.param-row.open{
  display:flex;
}
/* 參數欄位橫排 */
.param-row-inner{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:6px;
}
.param-cell{display:flex;flex-direction:column;gap:2px}
.param-label{
  font-family:"IBM Plex Mono",monospace;
  font-size:9px;
  color:var(--text3);
  letter-spacing:.03em;
}
.param-input{
  background:var(--bg2);
  border:1px solid var(--border2);
  color:var(--text1);
  font-family:"IBM Plex Mono",monospace;
  font-size:11px;
  padding:4px 7px;
  border-radius:4px;
  outline:none;
  width:100%;
  transition:border-color .15s;
}
.param-input:focus{border-color:var(--accent)}
.param-input:hover{border-color:var(--border2)}

</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="logo">台股<span>.</span>AI <span style="color:var(--text3);font-weight:400">回測系統</span> <span style="font-size:10px;color:var(--green)">v4.0</span></div>
    <div class="hdr-right">
      <a href="index.html" class="back-btn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>返回分析</a>
      <button class="btn-icon" onclick="toggleTheme()" title="切換主題"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    </div>
  </div>
</header>

<div class="layout">
  <div>
    <div class="panel">
      <div class="panel-hd"><span class="panel-title">基本設定</span><button class="btn-sm" onclick="loadDemo()">台積電示範</button></div>
      <div class="panel-body">
        <div class="field"><label class="field-label">股票代號</label><input class="field-input" id="stockCode" placeholder="如 2330、0050" value="2330"></div>
        <div class="field"><label class="field-label">回測區間</label>
          <div class="field-row">
            <input class="field-input" id="startDate" type="date" value="2020-01-01">
            <input class="field-input" id="endDate" type="date">
          </div></div>
        <div class="field"><label class="field-label">快速選擇</label>
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            <button class="btn-sm" onclick="setYears(1)">近1年</button>
            <button class="btn-sm" onclick="setYears(2)">近2年</button>
            <button class="btn-sm" onclick="setYears(3)">近3年</button>
            <button class="btn-sm" onclick="setYears(5)">近5年</button>
          </div></div>
        <div class="field"><label class="field-label">初始本金（元）</label><input class="field-input" id="capital" type="number" value="1000000"></div>
        <div class="field-row">
          <div class="field"><label class="field-label">交易時間點</label>
            <select class="field-select" id="execType">
              <option value="close">當日收盤（N）</option>
              <option value="open">隔日開盤（N+1）</option>
            </select></div>
          <div class="field"><label class="field-label">共振閾值（分）</label>
            <input class="field-input" id="scoreThreshold" type="number" value="1" min="1" max="10"></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-hd"><span class="panel-title">交易成本</span></div>
      <div class="panel-body">
        <div class="toggle-row"><span style="font-size:12px">自動判斷股票/ETF</span><div class="toggle on" id="autoFeeToggle" onclick="toggleAutoFee()"></div></div>
        <div id="feeAuto" style="font-size:10px;color:var(--text3);font-family:IBM Plex Mono,monospace;line-height:1.8">股票：買 0.1425% / 賣 0.4425%<br>ETF：買 0.1% / 賣 0.2%</div>
        <div id="feeCustom" style="display:none">
          <div class="field-row">
            <div class="field"><label class="field-label">買入費 %</label><input class="field-input" id="buyFee" type="number" step="0.001" value="0.1425"></div>
            <div class="field"><label class="field-label">賣出費+稅 %</label><input class="field-input" id="sellFee" type="number" step="0.001" value="0.4425"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-hd"><span class="panel-title">風險管理</span></div>
      <div class="panel-body">
        <div class="field"><label class="field-label">部位計算基準</label>
          <select class="field-select" id="positionBase">
            <option value="initial">初始本金（固定）</option>
            <option value="equity">總資金（複利）</option>
          </select></div>
        <div class="field-row">
          <div class="field"><label class="field-label">部位大小 %</label><input class="field-input" id="posSize" type="number" value="100"></div>
          <div class="field"><label class="field-label">停損 %</label><input class="field-input" id="stopLoss" type="number" placeholder="空=不設定"></div>
        </div>
        <div class="field"><label class="field-label">停利 %</label><input class="field-input" id="stopProfit" type="number" placeholder="空=不設定"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-hd"><span class="panel-title">做多策略</span></div>
      <div class="panel-body">
        <div class="section-hd">進場訊號（共振分數累加）</div>
        <div class="check-group" id="longEntryGroup"></div>
        <div class="section-hd">出場訊號</div>
        <div class="check-group" id="longExitGroup"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-hd"><span class="panel-title">做空策略</span><div class="toggle" id="shortToggle" onclick="toggleShort()"></div></div>
      <div id="shortBody" style="display:none"><div class="panel-body">
        <div class="section-hd" style="border:none;margin:0;padding-bottom:5px">做空進場</div>
        <div class="check-group" id="shortEntryGroup"></div>
        <div class="section-hd">回補出場</div>
        <div class="check-group" id="shortExitGroup"></div>
      </div></div>
    </div>

    <div class="panel">
      <div class="panel-hd"><span class="panel-title">策略管理</span></div>
      <div class="panel-body">
        <div style="display:flex;gap:6px">
          <input class="field-input" id="stratName" placeholder="策略名稱" style="flex:1">
          <button class="btn-sm" onclick="saveStrategy()">儲存</button>
        </div>
        <div class="strat-list" id="stratList"></div>
      </div>
    </div>

    <button class="btn-run" id="runBtn" onclick="runBacktest()">開始回測</button>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div style="font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--text3);text-align:center;margin-top:4px;min-height:14px" id="statusText"></div>
  </div>

  <div class="panel">
    <div class="tabs">
      <button class="tab on" onclick="switchTab(0)">摘要</button>
      <button class="tab" onclick="switchTab(1)">績效分析</button>
      <button class="tab" onclick="switchTab(2)">交易記錄</button>
      <button class="tab" onclick="switchTab(3)">參數優化</button>
      <button class="tab" onclick="switchTab(4)">批量優化</button>
    </div>
    <div class="tab-pane on" id="tab0"><div id="summaryContent"><div class="empty"><div class="empty-text">設定策略後點擊「開始回測」<br>或點選「台積電示範」快速體驗</div></div></div></div>
    <div class="tab-pane" id="tab1"><div id="perfContent"><div class="empty"><div class="empty-text">尚無回測結果</div></div></div></div>
    <div class="tab-pane" id="tab2"><div id="tradesContent"><div class="empty"><div class="empty-text">尚無交易記錄</div></div></div></div>
    <div class="tab-pane" id="tab3">
      <div style="padding:4px">
        <div class="field-row">
          <div class="field"><label class="field-label">優化目標</label>
            <select class="field-select" id="optTarget">
              <option value="cagr">年化報酬率</option><option value="sharpe">夏普比率</option>
              <option value="sortino">索提諾比率</option><option value="calmar">卡瑪比率</option>
              <option value="minDD">最小回撤</option>
            </select></div>
          <div class="field"><label class="field-label">測試組數（上限200）</label>
            <input class="field-input" id="optIter" type="number" value="60" max="200"></div>
        </div>
        <button class="btn-run" id="optBtn" onclick="runOptimize()">開始參數優化（Web Worker）</button>
        <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" id="optProgress" style="width:0%"></div></div>
        <div style="font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--text3);text-align:center;margin-top:4px;min-height:14px" id="optStatus"></div>
        <div id="optResult" style="margin-top:10px"></div>
      </div>
    </div>
    <div class="tab-pane" id="tab4">
      <div style="padding:4px">
        <div class="section-hd" style="border:none;margin:0 0 5px;padding:0">買入策略</div>
        <div class="check-group" id="batchEntryGroup"></div>
        <div style="display:flex;gap:5px;margin:5px 0"><button class="btn-sm" onclick="selectAll('batchEntryGroup')">全選</button><button class="btn-sm" onclick="clearAll('batchEntryGroup')">清除</button></div>
        <div class="section-hd" style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px">賣出策略</div>
        <div class="check-group" id="batchExitGroup"></div>
        <div style="display:flex;gap:5px;margin:5px 0"><button class="btn-sm" onclick="selectAll('batchExitGroup')">全選</button><button class="btn-sm" onclick="clearAll('batchExitGroup')">清除</button></div>
        <div class="field-row" style="margin-top:8px">
          <div class="field"><label class="field-label">優化目標</label>
            <select class="field-select" id="batchTarget">

<script id="workerSrc" type="text/plain">
// ═══════════════════════════════════════════════════════════════
// bt/core.js  —  台股回測核心引擎 v4.0
// ═══════════════════════════════════════════════════════════════
// 設計原則：
//   1. 純函數，無副作用，可在 Worker 中執行
//   2. Short accounting 遵循真實台股融券邏輯
//   3. 嚴格 signal/execution 分離，無 lookahead bias
//   4. Position object 完整，可擴充槓桿/分批
// ═══════════════════════════════════════════════════════════════

"use strict";

// ════════════════════════════════════════════════════════════
// ENGINE META
// ════════════════════════════════════════════════════════════
var BT_ENGINE = {
  version:    '4.1.0',
  buildDate:  '2026-05-15',
  features:   ['long','short','worker','exposure','metrics-v2'],
  // 預留接口
  _monteCarlo: null,  // Monte Carlo mode (future)
  _leverage:   null,  // Leverage mode (future)
  _multiPos:   null,  // Multi-position mode (future)
  _replay:     null,  // Bar-by-bar replay mode (future)
  _benchmark:  null,  // Benchmark vs index (future)
};

// Debug mode（localStorage 設 bt_debug=1 開啟）
var BT_DEBUG = (function() {
  try { return localStorage.getItem('bt_debug') === '1'; } catch(e) { return false; }
})();
function dbg() {
  if (!BT_DEBUG) return;
  var args = Array.prototype.slice.call(arguments);
  args.unshift('[BT]');
  console.log.apply(console, args);
}

// ──────────────────────────────────────────────────────────────
// 1. INDICATORS ENGINE
// ──────────────────────────────────────────────────────────────

var Indicators = (function() {

  function sma(arr, p) {
    var n = arr.length;
    var r = new Float64Array(n);
    r.fill(NaN);
    if (p > n) return r;
    var s = 0;
    for (var i = 0; i < p; i++) s += arr[i];
    r[p - 1] = s / p;
    for (var i = p; i < n; i++) {
      s += arr[i] - arr[i - p];
      r[i] = s / p;
    }
    return r;
  }

  function ema(arr, p) {
    var n = arr.length;
    var r = new Float64Array(n);
    r.fill(NaN);
    var k = 2 / (p + 1);
    var cnt = 0, sum = 0;
    for (var i = 0; i < n; i++) {
      if (isNaN(arr[i])) continue;
      cnt++;
      sum += arr[i];
      if (cnt < p) continue;
      if (cnt === p) { r[i] = sum / p; continue; }
      // 找到上一個非 NaN 的 r 值
      var prev = NaN;
      for (var j = i - 1; j >= 0; j--) { if (!isNaN(r[j])) { prev = r[j]; break; } }
      r[i] = isNaN(prev) ? arr[i] : arr[i] * k + prev * (1 - k);
    }
    return r;
  }

  // Wilder RSI (correct implementation)
  function rsi(closes, p) {
    p = p || 14;
    var n = closes.length;
    var r = new Float64Array(n);
    r.fill(NaN);
    if (n < p + 2) return r;
    var ag = 0, al = 0;
    for (var i = 1; i <= p; i++) {
      var d = closes[i] - closes[i - 1];
      if (d > 0) ag += d / p;
      else       al -= d / p;
    }
    r[p] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
    for (var i = p + 1; i < n; i++) {
      var d = closes[i] - closes[i - 1];
      var g = d > 0 ? d : 0;
      var l = d < 0 ? -d : 0;
      ag = (ag * (p - 1) + g) / p;
      al = (al * (p - 1) + l) / p;
      r[i] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
    }
    return r;
  }

  // KD (Stochastic) — Wilder smoothing 1/3
  function kd(highs, lows, closes, p) {
    p = p || 9;
    var n = closes.length;
    var K = new Float64Array(n); K.fill(NaN);
    var D = new Float64Array(n); D.fill(NaN);
    var pk = 50, pd = 50;
    for (var i = p - 1; i < n; i++) {
      var hi = -Infinity, lo = Infinity;
      for (var j = i - p + 1; j <= i; j++) {
        if (highs[j] > hi) hi = highs[j];
        if (lows[j]  < lo) lo = lows[j];
      }
      var rsv = hi === lo ? 50 : (closes[i] - lo) / (hi - lo) * 100;
      pk = rsv / 3 + pk * 2 / 3;
      pd = pk  / 3 + pd * 2 / 3;
      K[i] = pk; D[i] = pd;
    }
    return { k: K, d: D };
  }

  // MACD — EMA-based signal line (no zero-fill hack)
  function macd(closes, fast, slow, signal) {
    fast = fast || 12; slow = slow || 26; signal = signal || 9;
    var ef = ema(closes, fast);
    var es = ema(closes, slow);
    var n  = closes.length;
    var M  = new Float64Array(n); M.fill(NaN);
    for (var i = 0; i < n; i++) {
      if (!isNaN(ef[i]) && !isNaN(es[i])) M[i] = ef[i] - es[i];
    }
    // EMA of MACD (using only non-NaN values)
    var S = new Float64Array(n); S.fill(NaN);
    var k2 = 2 / (signal + 1), cnt = 0, sum = 0;
    for (var i = 0; i < n; i++) {
      if (isNaN(M[i])) continue;
      cnt++; sum += M[i];
      if (cnt < signal) continue;
      if (cnt === signal) { S[i] = sum / signal; continue; }
      var prev = NaN;
      for (var j = i - 1; j >= 0; j--) { if (!isNaN(S[j])) { prev = S[j]; break; } }
      S[i] = isNaN(prev) ? M[i] : M[i] * k2 + prev * (1 - k2);
    }
    var H = new Float64Array(n); H.fill(NaN);
    for (var i = 0; i < n; i++) {
      if (!isNaN(M[i]) && !isNaN(S[i])) H[i] = M[i] - S[i];
    }
    return { macd: M, signal: S, hist: H };
  }

  // Bollinger Bands
  function boll(closes, p, mult) {
    p = p || 20; mult = mult || 2;
    var n   = closes.length;
    var mid = sma(closes, p);
    var upper = new Float64Array(n); upper.fill(NaN);
    var lower = new Float64Array(n); lower.fill(NaN);
    for (var i = p - 1; i < n; i++) {
      var m = mid[i], s = 0;
      for (var j = i - p + 1; j <= i; j++) s += (closes[j] - m) * (closes[j] - m);
      var sd = Math.sqrt(s / p);
      upper[i] = m + mult * sd;
      lower[i] = m - mult * sd;
    }
    return { upper: upper, mid: mid, lower: lower };
  }

  // Williams %R
  function wr(highs, lows, closes, p) {
    p = p || 14;
    var n = closes.length;
    var r = new Float64Array(n); r.fill(NaN);
    for (var i = p - 1; i < n; i++) {
      var hi = -Infinity, lo = Infinity;
      for (var j = i - p + 1; j <= i; j++) {
        if (highs[j] > hi) hi = highs[j];
        if (lows[j]  < lo) lo = lows[j];
      }
      r[i] = hi === lo ? -50 : ((hi - closes[i]) / (hi - lo)) * -100;
    }
    return r;
  }

  // Donchian Channel
  function donchian(highs, lows, p) {
    p = p || 20;
    var n = highs.length;
    var upper = new Float64Array(n); upper.fill(NaN);
    var lower = new Float64Array(n); lower.fill(NaN);
    for (var i = p - 1; i < n; i++) {
      var hi = -Infinity, lo = Infinity;
      for (var j = i - p + 1; j <= i; j++) {
        if (highs[j] > hi) hi = highs[j];
        if (lows[j]  < lo) lo = lows[j];
      }
      upper[i] = hi; lower[i] = lo;
    }
    return { upper: upper, lower: lower };
  }

  // ── 動態指標計算（含參數，帶 cache 避免重複）────────────────
  function precompute(data, stratConfig) {
    var c = data.closes, h = data.highs, l = data.lows, v = data.volumes;
    var cache = {};

    function getSMA(p)  { var k='sma'+p;  return cache[k]||(cache[k]=sma(c,p));   }
    function getEMA(p)  { var k='ema'+p;  return cache[k]||(cache[k]=ema(c,p));   }
    function getRSI(p)  { var k='rsi'+p;  return cache[k]||(cache[k]=rsi(c,p));   }
    function getKD(p)   { var k='kd'+p;   return cache[k]||(cache[k]=kd(h,l,c,p)); }
    function getBoll(p,m){ var k='boll'+p+'_'+m; return cache[k]||(cache[k]=boll(c,p,m)); }
    function getWR(p)   { var k='wr'+p;   return cache[k]||(cache[k]=wr(h,l,c,p)); }
    function getDC(p)   { var k='dc'+p;   return cache[k]||(cache[k]=donchian(h,l,p)); }
    function getVolSMA(p){ var k='vsma'+p; return cache[k]||(cache[k]=sma(v,p));  }
    function getMACD(f,s,sig) {
      var k='macd'+f+'_'+s+'_'+sig;
      return cache[k]||(cache[k]=macd(c,f,s,sig));
    }

    // 從 stratConfig 萃取所有用到的參數，動態計算所需指標
    var sc = stratConfig || {};
    var allStrats = []
      .concat(sc.longEntry||[]).concat(sc.longExit||[])
      .concat(sc.shortEntry||[]).concat(sc.shortExit||[]);

    // 預先計算每個策略需要的指標
    allStrats.forEach(function(s) {
      var p = s.params || {};
      var id = s.id || s;
      // MA類
      if (/ma_golden|ma_death|s_ma_golden|s_ma_death/.test(id)) {
        getSMA(p.fast||5); getSMA(p.slow||20);
      }
      if (/price_above_ma|price_below_ma|s_price/.test(id)) { getSMA(p.period||20); }
      // RSI
      if (/rsi/.test(id)) { getRSI(p.period||14); }
      // MACD
      if (/macd/.test(id)) { getMACD(p.fast||12, p.slow||26, p.signal||9); }
      // Boll
      if (/boll/.test(id)) { getBoll(p.period||20, p.mult||2); }
      // KD
      if (/kd/.test(id)) { getKD(p.period||9); }
      // Volume
      if (/vol_surge/.test(id)) { getVolSMA(p.volPeriod||20); }
      // WR
      if (/wr/.test(id)) { getWR(p.period||14); }
      // Donchian / Turtle
      if (/price_high|turtle_break|s_price_high|s_turtle_high/.test(id)) { getDC(p.period||20); }
      if (/price_low|turtle_stop|s_price_low|s_turtle_low/.test(id)) { getDC(p.period||20); }
    });

    // 永遠預計算幾個基本的（給今日訊號UI用）
    getSMA(5); getSMA(20); getRSI(14); getMACD(12,26,9); getBoll(20,2); getKD(9);
    getWR(14); getDC(20); getDC(10); getVolSMA(20);

    // 回傳 accessor 物件（惰性計算）
    return {
      // 基本快捷 key（兼容舊 code）
      ma5:   getSMA(5),  ma10: getSMA(10), ma20: getSMA(20),
      ma60:  getSMA(60), ma120:getSMA(120),ma200:getSMA(200),
      ema20: getEMA(20), ema200:getEMA(200),
      rsi14: getRSI(14),
      kd9:   getKD(9),
      macd:  getMACD(12,26,9),
      boll20:getBoll(20,2),
      wr14:  getWR(14),
      dc20:  getDC(20),
      dc10:  getDC(10),
      vol20: getVolSMA(20),
      // 動態取得函式
      getSMA, getEMA, getRSI, getKD, getBoll, getWR, getDC, getVolSMA, getMACD,
    };
  }

  return { sma, ema, rsi, kd, macd, boll, wr, donchian, precompute };
})();


// ──────────────────────────────────────────────────────────────
// 2. SIGNAL ENGINE
// ──────────────────────────────────────────────────────────────
// 規則：
//   - 所有訊號使用 sigDay（訊號產生日）的資料
//   - sigDay 和 execDay 由 ExecutionEngine 分離
//   - 此函數不接觸任何 execDay 的資料
// ──────────────────────────────────────────────────────────────

var SignalEngine = (function() {

  // 安全比較（NaN-safe）
  function v(x) { return !isNaN(x) && x != null; }

  // ── 從策略陣列取得某策略的參數（物件或預設值）───────────
  function getP(strategies, stratId, key, def) {
    var list = strategies.entry || strategies.exit || [];
    var found = null;
    list.forEach(function(s) {
      if ((s.id||s) === stratId) found = s.params || {};
    });
    if (!found) return def;
    return (found[key] != null) ? found[key] : def;
  }

  function scoreLongEntry(i, ind, data, strategies) {
    if (i < 1) return 0;
    var c = data.closes, vols = data.volumes;
    var p = i, q = i - 1;
    // 支援 string[] 或 {id, params}[] 兩種格式
    var entryIds = (strategies.entry||[]).map(function(s){ return s.id||s; });
    var score = 0;
    var pr = function(id, key, def){ return getP({entry:strategies.entry}, id, key, def); };

    // 均線黃金交叉
    if (entryIds.indexOf('ma_golden') >= 0) {
      var fast=pr('ma_golden','fast',5), slow=pr('ma_golden','slow',20);
      var mf=ind.getSMA(fast), ms=ind.getSMA(slow);
      if (v(mf[q])&&v(ms[q])&&v(mf[p])&&v(ms[p]))
        if (mf[q]<=ms[q] && mf[p]>ms[p]) score+=2;
    }
    // 價格突破均線
    if (entryIds.indexOf('price_above_ma') >= 0) {
      var period=pr('price_above_ma','period',20), ma=ind.getSMA(period);
      if (v(ma[p])) if (c[q]<=ma[q] && c[p]>ma[p]) score+=1;
    }
    // RSI超賣
    if (entryIds.indexOf('rsi_oversold') >= 0) {
      var period=pr('rsi_oversold','period',14), thr=pr('rsi_oversold','threshold',30);
      var r=ind.getRSI(period);
      if (v(r[q])&&v(r[p])) {
        if (r[q]<thr && r[p]>=thr) score+=3;
        else if (r[p]<thr-5)       score+=1;
      }
    }
    // MACD黃金交叉
    if (entryIds.indexOf('macd_golden') >= 0) {
      var fast=pr('macd_golden','fast',12), slow=pr('macd_golden','slow',26), sig=pr('macd_golden','signal',9);
      var m=ind.getMACD(fast,slow,sig);
      if (v(m.hist[q])&&v(m.hist[p])) if (m.hist[q]<0&&m.hist[p]>=0) score+=2;
    }
    // 布林突破下軌
    if (entryIds.indexOf('boll_break') >= 0) {
      var period=pr('boll_break','period',20), mult=pr('boll_break','mult',2);
      var b=ind.getBoll(period,mult);
      if (v(b.lower[p])) if (c[q]<=b.lower[q]&&c[p]>b.lower[p]) score+=2;
    }
    // KD黃金交叉
    if (entryIds.indexOf('kd_golden') >= 0) {
      var period=pr('kd_golden','period',9), thr=pr('kd_golden','threshold',50);
      var kobj=ind.getKD(period);
      if (v(kobj.k[q])&&v(kobj.d[q]))
        if (kobj.k[q]<=kobj.d[q]&&kobj.k[p]>kobj.d[p]&&kobj.k[p]<thr) score+=2;
    }
    // 成交量爆增
    if (entryIds.indexOf('vol_surge') >= 0) {
      var vp=pr('vol_surge','volPeriod',20), vm=pr('vol_surge','volMult',2.0);
      var vs=ind.getVolSMA(vp);
      if (v(vs[p])) if (vols[p]>vs[p]*vm&&c[p]>c[q]) score+=1;
    }
    // 突破N日前高
    if (entryIds.indexOf('price_high') >= 0) {
      var period=pr('price_high','period',20), dc=ind.getDC(period);
      if (v(dc.upper[q])) if (c[p]>dc.upper[q]) score+=2;
    }
    // 威廉%R超賣
    if (entryIds.indexOf('wr_oversold') >= 0) {
      var period=pr('wr_oversold','period',14), thr=pr('wr_oversold','threshold',-80);
      var wrv=ind.getWR(period);
      if (v(wrv[q])&&v(wrv[p])) if (wrv[q]<thr&&wrv[p]>=thr) score+=2;
    }
    // 海龜突破
    if (entryIds.indexOf('turtle_break') >= 0) {
      var period=pr('turtle_break','period',20), dc=ind.getDC(period);
      if (v(dc.upper[q])) if (c[p]>dc.upper[q]) score+=2;
    }
    return score;
  }

  function scoreLongExit(i, ind, data, strategies) {
    if (i < 1) return 0;
    var c = data.closes;
    var p = i, q = i - 1;
    var exitIds = (strategies.exit||[]).map(function(s){ return s.id||s; });
    var score = 0;
    var pr = function(id, key, def){ return getP({exit:strategies.exit}, id, key, def); };

    // 均線死亡交叉
    if (exitIds.indexOf('ma_death') >= 0) {
      var fast=pr('ma_death','fast',5), slow=pr('ma_death','slow',20);
      var mf=ind.getSMA(fast), ms=ind.getSMA(slow);
      if (v(mf[q])&&v(ms[q])) if (mf[q]>=ms[q]&&mf[p]<ms[p]) score+=2;
    }
    // 跌破均線
    if (exitIds.indexOf('price_below_ma') >= 0) {
      var period=pr('price_below_ma','period',20), ma=ind.getSMA(period);
      if (v(ma[p])) if (c[q]>=ma[q]&&c[p]<ma[p]) score+=1;
    }
    // RSI超買回落
    if (exitIds.indexOf('rsi_overbought') >= 0) {
      var period=pr('rsi_overbought','period',14), thr=pr('rsi_overbought','threshold',70);
      var r=ind.getRSI(period);
      if (v(r[q])&&v(r[p])) {
        if (r[q]>thr&&r[p]<=thr) score+=3;
        else if (r[p]>thr+10)    score+=1;
      }
    }
    // MACD死亡交叉
    if (exitIds.indexOf('macd_death') >= 0) {
      var fast=pr('macd_death','fast',12), slow=pr('macd_death','slow',26), sig=pr('macd_death','signal',9);
      var m=ind.getMACD(fast,slow,sig);
      if (v(m.hist[q])&&v(m.hist[p])) if (m.hist[q]>0&&m.hist[p]<=0) score+=2;
    }
    // 觸碰布林上軌
    if (exitIds.indexOf('boll_upper') >= 0) {
      var period=pr('boll_upper','period',20), mult=pr('boll_upper','mult',2);
      var b=ind.getBoll(period,mult);
      if (v(b.upper[p])) if (c[p]>=b.upper[p]) score+=1;
    }
    // KD死亡交叉
    if (exitIds.indexOf('kd_death') >= 0) {
      var period=pr('kd_death','period',9), thr=pr('kd_death','threshold',50);
      var kobj=ind.getKD(period);
      if (v(kobj.k[q])&&v(kobj.d[q]))
        if (kobj.k[q]>=kobj.d[q]&&kobj.k[p]<kobj.d[p]&&kobj.k[p]>thr) score+=2;
    }
    // 跌破N日前低
    if (exitIds.indexOf('price_low') >= 0) {
      var period=pr('price_low','period',20), dc=ind.getDC(period);
      if (v(dc.lower[q])) if (c[p]<dc.lower[q]) score+=2;
    }
    // 威廉%R超買
    if (exitIds.indexOf('wr_overbought') >= 0) {
      var period=pr('wr_overbought','period',14), thr=pr('wr_overbought','threshold',-20);
      var wrv=ind.getWR(period);
      if (v(wrv[q])&&v(wrv[p])) if (wrv[q]>thr&&wrv[p]<=thr) score+=2;
    }
    // 海龜停損N日低
    if (exitIds.indexOf('turtle_stop') >= 0) {
      var period=pr('turtle_stop','period',10), dc=ind.getDC(period);
      if (v(dc.lower[q])) if (c[p]<dc.lower[q]) score+=2;
    }
    // 移動停損（在 ExecutionEngine 處理，這裡不計分）
    return score;
  }

  function scoreShortEntry(i, ind, data, strategies) {
    if (i < 1) return 0;
    var c = data.closes;
    var p = i, q = i - 1;
    var entryIds = (strategies.entry||[]).map(function(s){ return s.id||s; });
    var score = 0;
    var pr = function(id, key, def){ return getP({entry:strategies.entry}, id, key, def); };

    if (entryIds.indexOf('s_ma_death') >= 0) {
      var fast=pr('s_ma_death','fast',5), slow=pr('s_ma_death','slow',20);
      var mf=ind.getSMA(fast), ms=ind.getSMA(slow);
      if (v(mf[q])&&v(ms[q])) if (mf[q]>=ms[q]&&mf[p]<ms[p]) score+=2;
    }
    if (entryIds.indexOf('s_price_below_ma') >= 0) {
      var period=pr('s_price_below_ma','period',20), ma=ind.getSMA(period);
      if (v(ma[p])) if (c[q]>=ma[q]&&c[p]<ma[p]) score+=1;
    }
    if (entryIds.indexOf('s_rsi_overbought') >= 0) {
      var period=pr('s_rsi_overbought','period',14), thr=pr('s_rsi_overbought','threshold',70);
      var r=ind.getRSI(period);
      if (v(r[q])&&v(r[p])) if (r[q]>thr&&r[p]<=thr) score+=3;
    }
    if (entryIds.indexOf('s_macd_death') >= 0) {
      var fast=pr('s_macd_death','fast',12), slow=pr('s_macd_death','slow',26), sig=pr('s_macd_death','signal',9);
      var m=ind.getMACD(fast,slow,sig);
      if (v(m.hist[q])&&v(m.hist[p])) if (m.hist[q]>0&&m.hist[p]<=0) score+=2;
    }
    if (entryIds.indexOf('s_boll_upper') >= 0) {
      var period=pr('s_boll_upper','period',20), mult=pr('s_boll_upper','mult',2);
      var b=ind.getBoll(period,mult);
      if (v(b.upper[p])) if (c[p]>=b.upper[p]) score+=1;
    }
    if (entryIds.indexOf('s_kd_death') >= 0) {
      var period=pr('s_kd_death','period',9), thr=pr('s_kd_death','threshold',50);
      var kobj=ind.getKD(period);
      if (v(kobj.k[q])&&v(kobj.d[q]))
        if (kobj.k[q]>=kobj.d[q]&&kobj.k[p]<kobj.d[p]&&kobj.k[p]>thr) score+=2;
    }
    if (entryIds.indexOf('s_price_low') >= 0) {
      var period=pr('s_price_low','period',20), dc=ind.getDC(period);
      if (v(dc.lower[q])) if (c[p]<dc.lower[q]) score+=2;
    }
    if (entryIds.indexOf('s_wr_overbought') >= 0) {
      var period=pr('s_wr_overbought','period',14), thr=pr('s_wr_overbought','threshold',-20);
      var wrv=ind.getWR(period);
      if (v(wrv[q])&&v(wrv[p])) if (wrv[q]>thr&&wrv[p]<=thr) score+=2;
    }
    if (entryIds.indexOf('s_turtle_low') >= 0) {
      var period=pr('s_turtle_low','period',20), dc=ind.getDC(period);
      if (v(dc.lower[q])) if (c[p]<dc.lower[q]) score+=2;
    }
    return score;
  }

  function scoreShortExit(i, ind, data, strategies) {
    if (i < 1) return 0;
    var c = data.closes;
    var p = i, q = i - 1;
    var exitIds = (strategies.exit||[]).map(function(s){ return s.id||s; });
    var score = 0;
    var pr = function(id, key, def){ return getP({exit:strategies.exit}, id, key, def); };

    if (exitIds.indexOf('s_ma_golden') >= 0) {
      var fast=pr('s_ma_golden','fast',5), slow=pr('s_ma_golden','slow',20);
      var mf=ind.getSMA(fast), ms=ind.getSMA(slow);
      if (v(mf[q])&&v(ms[q])) if (mf[q]<=ms[q]&&mf[p]>ms[p]) score+=2;
    }
    if (exitIds.indexOf('s_price_above_ma') >= 0) {
      var period=pr('s_price_above_ma','period',20), ma=ind.getSMA(period);
      if (v(ma[p])) if (c[q]<=ma[q]&&c[p]>ma[p]) score+=1;
    }
    if (exitIds.indexOf('s_rsi_oversold') >= 0) {
      var period=pr('s_rsi_oversold','period',14), thr=pr('s_rsi_oversold','threshold',30);
      var r=ind.getRSI(period);
      if (v(r[q])&&v(r[p])) if (r[q]<thr&&r[p]>=thr) score+=3;
    }
    if (exitIds.indexOf('s_macd_golden') >= 0) {
      var fast=pr('s_macd_golden','fast',12), slow=pr('s_macd_golden','slow',26), sig=pr('s_macd_golden','signal',9);
      var m=ind.getMACD(fast,slow,sig);
      if (v(m.hist[q])&&v(m.hist[p])) if (m.hist[q]<0&&m.hist[p]>=0) score+=2;
    }
    if (exitIds.indexOf('s_boll_lower') >= 0) {
      var period=pr('s_boll_lower','period',20), mult=pr('s_boll_lower','mult',2);
      var b=ind.getBoll(period,mult);
      if (v(b.lower[p])) if (c[p]<=b.lower[p]) score+=1;
    }
    if (exitIds.indexOf('s_kd_golden') >= 0) {
      var period=pr('s_kd_golden','period',9), thr=pr('s_kd_golden','threshold',50);
      var kobj=ind.getKD(period);
      if (v(kobj.k[q])&&v(kobj.d[q]))
        if (kobj.k[q]<=kobj.d[q]&&kobj.k[p]>kobj.d[p]&&kobj.k[p]<thr) score+=2;
    }
    if (exitIds.indexOf('s_price_high') >= 0) {
      var period=pr('s_price_high','period',20), dc=ind.getDC(period);
      if (v(dc.upper[q])) if (c[p]>dc.upper[q]) score+=2;
    }
    if (exitIds.indexOf('s_wr_oversold') >= 0) {
      var period=pr('s_wr_oversold','period',14), thr=pr('s_wr_oversold','threshold',-80);
      var wrv=ind.getWR(period);
      if (v(wrv[q])&&v(wrv[p])) if (wrv[q]<thr&&wrv[p]>=thr) score+=2;
    }
    if (exitIds.indexOf('s_turtle_high') >= 0) {
      var period=pr('s_turtle_high','period',20), dc=ind.getDC(period);
      if (v(dc.upper[q])) if (c[p]>dc.upper[q]) score+=2;
    }
    return score;
  }

  // Generate full signal arrays (one per bar)
  // Returns { longEntry[], longExit[], shortEntry[], shortExit[] }
  function generate(data, ind, longStrat, shortStrat, shortEnabled) {
    var n = data.closes.length;
    var le = new Int8Array(n), lx = new Int8Array(n);
    var se = new Int8Array(n), sx = new Int8Array(n);
    for (var i = 1; i < n; i++) {
      le[i] = scoreLongEntry(i, ind, data, longStrat);
      lx[i] = scoreLongExit(i, ind, data, longStrat);
      if (shortEnabled) {
        se[i] = scoreShortEntry(i, ind, data, shortStrat);
        sx[i] = scoreShortExit(i, ind, data, shortStrat);
      }
    }
    return { longEntry: le, longExit: lx, shortEntry: se, shortExit: sx };
  }

  return { generate, scoreLongEntry, scoreLongExit, scoreShortEntry, scoreShortExit };
})();


// ──────────────────────────────────────────────────────────────
// 3. POSITION OBJECT
// ──────────────────────────────────────────────────────────────

function createPosition(side, qty, entryPrice, entryDate, feeRate) {
  var cost = qty * 1000 * entryPrice;
  var fees = cost * feeRate;
  return {
    side:             side,           // 'long' | 'short'
    qty:              qty,            // 張數
    entryPrice:       entryPrice,
    entryDate:        entryDate,
    markPrice:        entryPrice,
    margin:           cost,           // 凍結資金（多=成本, 空=保證金）
    entryFees:        fees,           // 進場手續費
    unrealizedPnl:    0,
    realizedPnl:      0,
    trailHigh:        entryPrice,     // 多單移動停損追蹤
    trailLow:         entryPrice,     // 空單移動停損追蹤
  };
}

function updatePositionMark(pos, currentPrice) {
  pos.markPrice = currentPrice;
  if (pos.side === 'long') {
    pos.unrealizedPnl = pos.qty * 1000 * (currentPrice - pos.entryPrice) - pos.entryFees;
    if (currentPrice > pos.trailHigh) pos.trailHigh = currentPrice;
  } else {
    pos.unrealizedPnl = pos.qty * 1000 * (pos.entryPrice - currentPrice) - pos.entryFees;
    if (currentPrice < pos.trailLow) pos.trailLow = currentPrice;
  }
}

function closePosition(pos, exitPrice, exitDate, sellFeeRate) {
  var exitFees = pos.qty * 1000 * exitPrice * sellFeeRate;
  var grossPnl = pos.side === 'long'
    ? pos.qty * 1000 * (exitPrice - pos.entryPrice) - pos.entryFees
    : pos.qty * 1000 * (pos.entryPrice - exitPrice) - pos.entryFees;
  var netPnl = grossPnl - exitFees;
  return {
    exitPrice:  exitPrice,
    exitDate:   exitDate,
    exitFees:   exitFees,
    grossPnl:   grossPnl,
    netPnl:     netPnl,
    pnlPct:     (netPnl / pos.margin) * 100,
    returnMargin: pos.margin + netPnl,  // 退還給 portfolio 的金額
  };
}


// ──────────────────────────────────────────────────────────────
// 4. PORTFOLIO ENGINE
// ──────────────────────────────────────────────────────────────
// 帳戶模型：
//   balance         = 未凍結現金
//   usedMargin      = 凍結中的保證金（進場成本 or 放空保證金）
//   unrealizedPnl   = 未平倉浮動損益
//   equity          = balance + usedMargin + unrealizedPnl
//   availableMargin = balance（可用）
// ──────────────────────────────────────────────────────────────

function createPortfolio(initCapital) {
  return {
    initCapital:   initCapital,
    balance:       initCapital,  // 可用現金
    usedMargin:    0,            // 凍結保證金
    unrealizedPnl: 0,
    realizedPnl:   0,
    position:      null,         // 當前持倉（單一部位）
  };
}

function portfolioEquity(pf) {
  return pf.balance + pf.usedMargin + pf.unrealizedPnl;
}

function portfolioEnterLong(pf, qty, price, date, buyFeeRate) {
  var cost = qty * 1000 * price;
  var fees = cost * buyFeeRate;
  var totalCost = cost + fees;
  if (totalCost > pf.balance || qty <= 0) return false;

  pf.balance    -= totalCost;
  pf.usedMargin += cost;                // 凍結持股市值（不含手續費）
  pf.position    = createPosition('long', qty, price, date, buyFeeRate);
  pf.position.entryFees = fees;
  return true;
}

// ── 正確的做空會計 ──────────────────────────────────────────────
// 台股融券：
//   進場：凍結保證金 = 放空市值（此處簡化為 100% 保證金率）
//         balance -= margin
//         usedMargin += margin
//   出場：
//         grossPnl = qty * 1000 * (entryPrice - exitPrice)
//         fees = exitValue * sellFeeRate
//         netPnl = grossPnl - entryFees - exitFees
//         退還 = margin + netPnl
//         balance += margin + netPnl  （只退保證金+損益，不憑空加本金）
//         usedMargin -= margin
// ──────────────────────────────────────────────────────────────
function portfolioEnterShort(pf, qty, price, date, buyFeeRate) {
  var margin = qty * 1000 * price;     // 凍結保證金
  var fees   = margin * buyFeeRate;    // 融券手續費
  if (margin + fees > pf.balance || qty <= 0) return false;

  pf.balance    -= (margin + fees);   // 扣除保證金 + 手續費
  pf.usedMargin += margin;            // 凍結保證金
  pf.position    = createPosition('short', qty, price, date, buyFeeRate);
  pf.position.entryFees = fees;
  return true;
}

function portfolioExitPosition(pf, exitPrice, date, sellFeeRate, reason) {
  if (!pf.position) return null;
  var pos    = pf.position;
  var result = closePosition(pos, exitPrice, date, sellFeeRate);

  // 退還保證金 + 損益（正確做法）
  pf.balance    += result.returnMargin;
  pf.usedMargin -= pos.margin;
  pf.realizedPnl += result.netPnl;
  pf.unrealizedPnl = 0;

  var trade = {
    entryDate:  pos.entryDate,
    exitDate:   date,
    side:       pos.side,
    qty:        pos.qty,
    entryPrice: pos.entryPrice,
    exitPrice:  exitPrice,
    entryFees:  pos.entryFees,
    exitFees:   result.exitFees,
    grossPnl:   result.grossPnl,
    netPnl:     result.netPnl,
    pnlPct:     result.pnlPct,
    reason:     reason || 'strategy',
  };

  pf.position = null;
  return trade;
}

function portfolioUpdateMark(pf, currentPrice) {
  if (!pf.position) { pf.unrealizedPnl = 0; return; }
  updatePositionMark(pf.position, currentPrice);
  pf.unrealizedPnl = pf.position.unrealizedPnl;
}


// ──────────────────────────────────────────────────────────────
// 5. EXECUTION ENGINE
// ──────────────────────────────────────────────────────────────
// 核心設計：
//   close mode: sigDay=i, execDay=i,   execPrice=closes[i]
//   open  mode: sigDay=i, execDay=i+1, execPrice=opens[i+1]
//   → 所有訊號預先計算好（SignalEngine.generate），
//     再按 execDay 執行，保證零 lookahead bias
// ──────────────────────────────────────────────────────────────

var ExecutionEngine = (function() {

  var WARMUP = 250; // MA200 需要 200 根，再留 50 根穩定

  function run(data, config) {
    var n       = data.closes.length;
    var closes  = data.closes;
    var opens   = data.opens;
    var dates   = data.dates;

    var capital       = +config.capital      || 1000000;
    var execType      = config.execType      || 'close';
    var posBase       = config.positionBase  || 'initial';
    var posSizePct    = Math.min(Math.max(+config.posSize || 100, 1), 100) / 100;
    var stopLossPct   = +config.stopLoss   > 0 ? +config.stopLoss   / 100 : null;
    var stopProfitPct = +config.stopProfit > 0 ? +config.stopProfit / 100 : null;
    var threshold     = Math.max(parseInt(config.scoreThreshold, 10) || 1, 1);
    var isETF         = /^00/.test((config.code || ''));
    var buyFeeRate    = +config.buyFee  > 0 ? +config.buyFee  / 100 : (isETF ? 0.001 : 0.001425);
    var sellFeeRate   = +config.sellFee > 0 ? +config.sellFee / 100 : (isETF ? 0.002 : 0.004425);
    var shortEnabled  = !!config.shortEnabled;

    var longStrat  = { entry: config.longEntry  || [], exit: config.longExit  || [] };
    var shortStrat = { entry: config.shortEntry || [], exit: config.shortExit || [] };

    // Step 1: 預計算所有指標（傳入策略設定讓 precompute 動態計算）
    var stratConfig = {
      longEntry:  config.longEntry  || [],
      longExit:   config.longExit   || [],
      shortEntry: config.shortEntry || [],
      shortExit:  config.shortExit  || [],
    };
    var ind = Indicators.precompute(data, stratConfig);

    // Step 2: 預計算所有訊號（sigDay 為基準）
    var sigs = SignalEngine.generate(data, ind, longStrat, shortStrat, shortEnabled);

    // Step 3: 初始化 portfolio
    var pf      = createPortfolio(capital);
    var equity  = new Float64Array(n);
    var trades  = [];

    // execType=open：第 i 天的訊號在第 i+1 天開盤執行
    // execType=close：第 i 天的訊號在第 i 天收盤執行
    // 為了統一迴圈，建立 pending 訊號
    var pendingLongEntry  = false;
    var pendingLongExit   = false;
    var pendingShortEntry = false;
    var pendingShortExit  = false;
    var pendingReason     = '';

    for (var i = 0; i < n; i++) {
      var closePrice = closes[i];
      var openPrice  = opens[i] || closes[i];
      var date       = dates[i];

      // ── 確定今日執行價 ────────────────────────────────────
      var execPrice;
      if (execType === 'open') {
        execPrice = openPrice;   // 今日開盤（前日訊號）
      } else {
        execPrice = closePrice;  // 今日收盤（今日訊號）
      }

      if (!execPrice || execPrice <= 0) {
        portfolioUpdateMark(pf, closePrice || 0);
        equity[i] = portfolioEquity(pf);
        continue;
      }

      // ── 執行前日 pending 訊號（open 模式）──────────────────
      if (execType === 'open' && i > 0) {
        if (pendingLongEntry && !pf.position) {
          var base = posBase === 'equity' ? portfolioEquity(pf) : capital;
          var lots = Math.floor(base * posSizePct / (execPrice * 1000));
          portfolioEnterLong(pf, lots, execPrice, date, buyFeeRate);
          if (pf.position) {
            trades.push({ type: 'entry', side: 'long', date, price: execPrice, qty: lots, reason: 'strategy' });
          }
        }
        if (pendingLongExit && pf.position && pf.position.side === 'long') {
          var t = portfolioExitPosition(pf, execPrice, date, sellFeeRate, pendingReason || 'strategy');
          if (t) trades.push({ type: 'exit', side: 'long', date, price: execPrice, qty: t.qty, ...t });
        }
        if (pendingShortEntry && !pf.position) {
          var base = posBase === 'equity' ? portfolioEquity(pf) : capital;
          var lots = Math.floor(base * posSizePct / (execPrice * 1000));
          portfolioEnterShort(pf, lots, execPrice, date, buyFeeRate);
          if (pf.position) {
            trades.push({ type: 'entry', side: 'short', date, price: execPrice, qty: lots, reason: 'strategy' });
          }
        }
        if (pendingShortExit && pf.position && pf.position.side === 'short') {
          var t = portfolioExitPosition(pf, execPrice, date, sellFeeRate, pendingReason || 'strategy');
          if (t) trades.push({ type: 'exit', side: 'short', date, price: execPrice, qty: t.qty, ...t });
        }
        pendingLongEntry = pendingLongExit = pendingShortEntry = pendingShortExit = false;
        pendingReason = '';
      }

      // ── 停損停利（當日收盤檢查，open 模式也一樣）──────────
      if (pf.position) {
        portfolioUpdateMark(pf, closePrice);
        var pos = pf.position;

        // 跳空開盤停損（更真實：先用開盤價確認）
        var checkPrice = (execType === 'open') ? openPrice : closePrice;

        if (pos.side === 'long') {
          var unrealPct = (checkPrice - pos.entryPrice) / pos.entryPrice;
          if (stopLossPct   && unrealPct <= -stopLossPct) {
            var t = portfolioExitPosition(pf, checkPrice, date, sellFeeRate, 'stopLoss');
            if (t) trades.push({ type: 'exit', side: 'long', date, price: checkPrice, qty: t.qty, ...t });
          } else if (stopProfitPct && unrealPct >= stopProfitPct) {
            var t = portfolioExitPosition(pf, closePrice, date, sellFeeRate, 'stopProfit');
            if (t) trades.push({ type: 'exit', side: 'long', date, price: closePrice, qty: t.qty, ...t });
          } else if (longStrat.exit.indexOf('trailing_stop') >= 0 && pf.position) {
            if (closePrice < pf.position.trailHigh * 0.95) {
              var t = portfolioExitPosition(pf, closePrice, date, sellFeeRate, 'trailingStop');
              if (t) trades.push({ type: 'exit', side: 'long', date, price: closePrice, qty: t.qty, ...t });
            }
          }
        } else if (pos.side === 'short') {
          var unrealPct = (pos.entryPrice - checkPrice) / pos.entryPrice;
          if (stopLossPct   && unrealPct <= -stopLossPct) {
            var t = portfolioExitPosition(pf, checkPrice, date, sellFeeRate, 'stopLoss');
            if (t) trades.push({ type: 'exit', side: 'short', date, price: checkPrice, qty: t.qty, ...t });
          } else if (stopProfitPct && unrealPct >= stopProfitPct) {
            var t = portfolioExitPosition(pf, closePrice, date, sellFeeRate, 'stopProfit');
            if (t) trades.push({ type: 'exit', side: 'short', date, price: closePrice, qty: t.qty, ...t });
          } else if (shortStrat.exit.indexOf('s_trailing') >= 0 && pf.position) {
            if (closePrice > pf.position.trailLow * 1.05) {
              var t = portfolioExitPosition(pf, closePrice, date, sellFeeRate, 'trailingStop');
              if (t) trades.push({ type: 'exit', side: 'short', date, price: closePrice, qty: t.qty, ...t });
            }
          }
        }
      }

      // ── 策略訊號執行（warm-up 後）──────────────────────────
      var sigIdx = i; // 訊號永遠用 today（不管 execType，訊號都是今天）

      if (sigIdx >= WARMUP) {
        var leScore = sigs.longEntry[sigIdx];
        var lxScore = sigs.longExit[sigIdx];
        var seScore = sigs.shortEntry[sigIdx];
        var sxScore = sigs.shortExit[sigIdx];

        if (execType === 'close') {
          // 今日收盤執行
          if (!pf.position) {
            if (leScore >= threshold) {
              var base = posBase === 'equity' ? portfolioEquity(pf) : capital;
              var lots = Math.floor(base * posSizePct / (execPrice * 1000));
              portfolioEnterLong(pf, lots, execPrice, date, buyFeeRate);
              if (pf.position) trades.push({ type: 'entry', side: 'long', date, price: execPrice, qty: lots, reason: 'strategy', score: leScore });
            } else if (shortEnabled && seScore >= threshold) {
              var base = posBase === 'equity' ? portfolioEquity(pf) : capital;
              var lots = Math.floor(base * posSizePct / (execPrice * 1000));
              portfolioEnterShort(pf, lots, execPrice, date, buyFeeRate);
              if (pf.position) trades.push({ type: 'entry', side: 'short', date, price: execPrice, qty: lots, reason: 'strategy', score: seScore });
            }
          } else if (pf.position.side === 'long' && lxScore >= threshold) {
            var t = portfolioExitPosition(pf, execPrice, date, sellFeeRate, 'strategy');
            if (t) trades.push({ type: 'exit', side: 'long', date, price: execPrice, qty: t.qty, ...t });
          } else if (pf.position.side === 'short' && sxScore >= threshold) {
            var t = portfolioExitPosition(pf, execPrice, date, sellFeeRate, 'strategy');
            if (t) trades.push({ type: 'exit', side: 'short', date, price: execPrice, qty: t.qty, ...t });
          }
        } else {
          // open 模式：設定 pending，明日開盤執行
          if (!pf.position) {
            if (leScore >= threshold) { pendingLongEntry = true; }
            else if (shortEnabled && seScore >= threshold) { pendingShortEntry = true; }
          } else if (pf.position.side === 'long' && lxScore >= threshold) {
            pendingLongExit = true; pendingReason = 'strategy';
          } else if (pf.position.side === 'short' && sxScore >= threshold) {
            pendingShortExit = true; pendingReason = 'strategy';
          }
        }
      }

      // ── Mark-to-market ─────────────────────────────────────
      portfolioUpdateMark(pf, closePrice);
      equity[i] = portfolioEquity(pf);

      // 防止 NaN 擴散
      if (isNaN(equity[i])) equity[i] = i > 0 ? equity[i-1] : capital;
    }

    return { equity, trades, finalPortfolio: pf };
  }

  return { run };
})();


// ──────────────────────────────────────────────────────────────
// 6. METRICS ENGINE
// ──────────────────────────────────────────────────────────────

var MetricsEngine = (function() {

// no-trade edge case：回傳空白 metrics（避免 NaN 擴散）
function _emptyMetrics(initCapital) {
  return {
    totalReturn:0, cagr:0, annReturn:0,
    sharpe:0, sortino:0, calmar:0,
    maxDD:0, maxDDLen:0, recoveryFactor:0,
    exposure:0, annVolatility:0, downsideDev:0,
    tradeCount:0, winRate:0, avgWin:0, avgLoss:0,
    grossProfit:0, grossLoss:0, profitFactor:0, expectancy:0,
    maxWinStreak:0, maxLoseStreak:0,
    avgHoldingDays:0, avgBarsPerTrade:0,
    finalEquity:initCapital, initCapital:initCapital,
    years:0, annual:{},
  };
}


  function compute(equity, trades, initCapital, dates) {
    var n = equity.length;
    // no data edge case（只在完全沒資料時歸零）
    if (!n || !trades) {
      return _emptyMetrics(initCapital || 1000000);
    }
    // 若有進場但尚未出場（持倉中），仍繼續計算績效（equity 曲線有浮動損益）
    var finalEquity = equity[n - 1];
    // negative equity / NaN protection（做空極端虧損時）
    if (!isFinite(finalEquity) || finalEquity <= 0) finalEquity = initCapital * 0.001;

    // ── 基本報酬 ──────────────────────────────────────────────
    var totalReturn = (finalEquity - initCapital) / initCapital;
    var years = Math.max(n / 252, 1 / 252);

    // CAGR（正確公式）
    var cagr = Math.pow(Math.max(finalEquity / initCapital, 1e-6), 1 / years) - 1;

    // ── 回撤計算 ──────────────────────────────────────────────
    var maxDD = 0, peak = equity[0];
    var ddStart = 0, ddEnd = 0, ddLen = 0, maxDDLen = 0;
    var curDDStart = 0;
    for (var i = 1; i < n; i++) {
      if (equity[i] > peak) { peak = equity[i]; curDDStart = i; }
      var dd = peak > 0 ? (peak - equity[i]) / peak : 0;
      if (dd > maxDD) { maxDD = dd; ddStart = curDDStart; ddEnd = i; maxDDLen = i - curDDStart; }
    }

    // ── 日報酬率（log return 更準確）──────────────────────────
    var logRets = [];
    for (var i = 1; i < n; i++) {
      if (equity[i - 1] > 0 && equity[i] > 0) logRets.push(Math.log(equity[i] / equity[i-1]));
    }
    var nd = logRets.length || 1;
    var meanRet = logRets.reduce(function(a,b){return a+b;},0) / nd;
    var variance = logRets.reduce(function(a,b){return a+Math.pow(b-meanRet,2);},0) / Math.max(nd-1,1);
    var stdRet = Math.sqrt(variance);

    // overflow/Infinity protection
    if (!isFinite(stdRet) || isNaN(stdRet)) stdRet = 0;
    var sharpe = stdRet > 1e-8 ? Math.max(Math.min((meanRet * Math.sqrt(252)) / stdRet, 999), -999) : 0;

    // Sortino（只用負報酬的下行標準差）
    var downRets = logRets.filter(function(r){return r < 0 && isFinite(r);});
    var downVar  = downRets.length > 1
      ? downRets.reduce(function(a,b){return a+b*b;},0) / (downRets.length - 1)
      : 1e-8;
    var downStd  = Math.sqrt(downVar) * Math.sqrt(252);
    if (!isFinite(downStd) || downStd <= 0) downStd = 1e-8;
    var sortino  = Math.max(Math.min(cagr / downStd, 999), -999);

    // Calmar Ratio — huge drawdown edge case
    var calmar = maxDD > 1e-8 ? Math.max(Math.min(cagr / maxDD, 999), -999) : 0;

    // ── 交易統計 ──────────────────────────────────────────────
    var closed = trades.filter(function(t){return t.type === 'exit';});
    var wins   = closed.filter(function(t){return t.netPnl > 0;});
    var losses = closed.filter(function(t){return t.netPnl <= 0;});

    var winRate      = closed.length > 0 ? wins.length / closed.length : 0;
    var avgWin       = wins.length   > 0 ? wins.reduce(function(a,t){return a+t.netPnl;},0)  / wins.length   : 0;
    var avgLoss      = losses.length > 0 ? losses.reduce(function(a,t){return a+t.netPnl;},0) / losses.length : 0;
    var grossProfit  = wins.reduce(function(a,t){return a+t.netPnl;},0);
    var grossLoss    = Math.abs(losses.reduce(function(a,t){return a+t.netPnl;},0));
    var profitFactor = grossLoss > 0 ? grossProfit / grossLoss : (grossProfit > 0 ? 999 : 0);
    var expectancy   = (winRate * avgWin) + ((1 - winRate) * avgLoss); // 期望值

    // 連勝/連敗
    var maxWS=0, maxLS=0, cW=0, cL=0;
    closed.forEach(function(t){
      if (t.netPnl > 0) { cW++; cL=0; if(cW>maxWS) maxWS=cW; }
      else               { cL++; cW=0; if(cL>maxLS) maxLS=cL; }
    });

    // Recovery Factor
    var recoveryFactor = maxDD > 1e-8 ? totalReturn / maxDD : 0;

    // Exposure：逐 bar 計算持倉狀態（正確版）
    // 建立日期→索引映射
    var dateToIdx = {};
    if (dates) { dates.forEach(function(d,i){ dateToIdx[d]=i; }); }
    // 標記每個 bar 是否持倉
    var inPositionBar = new Uint8Array(n); // 0=空倉, 1=持倉
    var posOpen = false;
    trades.forEach(function(t) {
      if (t.type === 'entry') { posOpen = true; }
      if (t.type === 'exit')  { posOpen = false; }
    });
    // 用 entry/exit 日期重建持倉區間
    var intervals = [];
    var lastEntry = -1;
    trades.forEach(function(t) {
      var ti = (t.date && dateToIdx[t.date] != null) ? dateToIdx[t.date]
             : (t.entryDate && dateToIdx[t.entryDate] != null) ? dateToIdx[t.entryDate] : -1;
      if (t.type === 'entry') { lastEntry = ti; }
      if (t.type === 'exit' && lastEntry >= 0) {
        var xi = (t.exitDate && dateToIdx[t.exitDate] != null) ? dateToIdx[t.exitDate]
               : (t.date && dateToIdx[t.date] != null) ? dateToIdx[t.date] : ti;
        intervals.push([lastEntry, xi]);
        lastEntry = -1;
      }
    });
    // 若有未平倉（lastEntry > 0），計入到最後一根 bar
    if (lastEntry >= 0) intervals.push([lastEntry, n-1]);
    // 標記持倉 bar
    intervals.forEach(function(iv) {
      for (var b = iv[0]; b <= iv[1] && b < n; b++) inPositionBar[b] = 1;
    });
    var inPosBars = 0;
    for (var b = 0; b < n; b++) { if (inPositionBar[b]) inPosBars++; }
    var exposure = n > 0 ? inPosBars / n : 0;

    // ── 年度績效 ──────────────────────────────────────────────
    var annual = {};
    if (dates) {
      dates.forEach(function(d, i) {
        if (!d) return;
        var y = d.slice(0,4);
        if (!annual[y]) annual[y] = { start:i, startV:equity[i] };
        annual[y].end = i; annual[y].endV = equity[i];
      });
      Object.keys(annual).forEach(function(y) {
        var a = annual[y];
        a.ret = (a.endV - a.startV) / a.startV;
        a.tradeCnt = closed.filter(function(t){return (t.exitDate||t.date||'').slice(0,4)===y;}).length;
      });
    }

    // ── 平均持倉天數 / annualized volatility / downside deviation ──
    var avgHoldingDays = 0, avgBarsPerTrade = 0;
    if (closed.length > 0) {
      var totalHoldBars = intervals.reduce(function(a,iv){ return a + (iv[1]-iv[0]+1); }, 0);
      avgBarsPerTrade   = totalHoldBars / Math.max(closed.length, 1);
      avgHoldingDays    = avgBarsPerTrade; // 台股每 bar = 1 交易日
    }

    // 年化波動率（用日 log return 的標準差）
    var annVolatility = stdRet * Math.sqrt(252);

    // Downside deviation（下行標準差，年化）
    var downsideDev = downStd;

    return {
      // 報酬
      totalReturn, cagr, annReturn: cagr,
      // 風險
      sharpe, sortino, calmar, maxDD, maxDDLen,
      recoveryFactor, exposure, annVolatility, downsideDev,
      // 交易
      tradeCount: closed.length,
      winRate, avgWin, avgLoss, grossProfit, grossLoss,
      profitFactor, expectancy,
      maxWinStreak: maxWS, maxLoseStreak: maxLS,
      avgHoldingDays, avgBarsPerTrade,
      // 帳戶
      finalEquity, initCapital,
      // 年度
      annual,
    };
  }

  return { compute };
})();


// ──────────────────────────────────────────────────────────────
// 7. TOP-LEVEL BACKTEST FUNCTION（供 Worker 呼叫）
// ──────────────────────────────────────────────────────────────

function runBacktestEngine(data, config) {
  // ── 輸入驗證（production hardening）────────────────────────
  if (!data || !data.closes) throw new Error('缺少資料');
  var n = data.closes.length;
  if (n < 60) throw new Error('資料不足（'+n+'筆），需至少 60 筆');

  // 修正缺失的 OHLC（holiday gaps / missing open）
  var closes  = data.closes  instanceof Float64Array ? data.closes  : new Float64Array(data.closes);
  var opens   = data.opens   instanceof Float64Array ? data.opens   : new Float64Array(data.opens   || data.closes);
  var highs   = data.highs   instanceof Float64Array ? data.highs   : new Float64Array(data.highs   || data.closes);
  var lows    = data.lows    instanceof Float64Array ? data.lows    : new Float64Array(data.lows    || data.closes);
  var volumes = data.volumes instanceof Float64Array ? data.volumes : new Float64Array(data.volumes || new Array(n).fill(0));

  // 修正 NaN/0/Infinity（向前填充）
  for (var i = 0; i < n; i++) {
    var prevC = i > 0 ? closes[i-1] : 0;
    if (!isFinite(closes[i])  || closes[i]  <= 0) closes[i]  = prevC;
    if (!isFinite(opens[i])   || opens[i]   <= 0) opens[i]   = closes[i];
    if (!isFinite(highs[i])   || highs[i]   <= 0) highs[i]   = closes[i];
    if (!isFinite(lows[i])    || lows[i]    <= 0) lows[i]    = closes[i];
    if (!isFinite(volumes[i]) || volumes[i] <  0) volumes[i] = 0;
    // high >= close >= low 修正
    if (highs[i] < closes[i]) highs[i] = closes[i];
    if (lows[i]  > closes[i]) lows[i]  = closes[i];
  }

  // 修正後的 data 物件
  data = {
    code: data.code || '', dates: data.dates || [],
    closes: closes, opens: opens, highs: highs, lows: lows, volumes: volumes,
  };

  dbg('runBacktestEngine', n, 'bars, config:', config);
  var result = ExecutionEngine.run(data, config);
  var metrics = MetricsEngine.compute(
    result.equity, result.trades, config.capital || 1000000, data.dates
  );
  return {
    equity:   Array.from(result.equity),
    trades:   result.trades,
    metrics:  metrics,
    annual:   metrics.annual,
  };
}

// Export for Worker use

// bt/worker.js — Web Worker
// 所有重計算在此執行，不阻塞 UI

"use strict";

// core.js inlined

self.onmessage = function(e) {
  var msg = e.data;
  try {
    switch (msg.type) {

      case 'backtest': {
        var result = runBacktestEngine(msg.data, msg.config);
        self.postMessage({ type: 'backtest_done', result: result, id: msg.id });
        break;
      }

      case 'optimize': {
        var data   = msg.data;
        var config = msg.config;
        var target = msg.target || 'cagr';
        var params = msg.params || generateParamGrid();
        // optimize over 200 loops protection
        var maxIter = Math.min(msg.maxIter || 200, 200);
        if (params.length > maxIter) params = params.slice(0, maxIter);
        var total  = params.length;
        var results = [];

        for (var i = 0; i < total; i++) {
          var c = Object.assign({}, config, params[i]);
          try {
            var r = runBacktestEngine(data, c);
            var score = getScore(r.metrics, target);
            results.push({ params: params[i], metrics: r.metrics, score: score });
          } catch(e2) {}

          // 每 10 筆回報進度
          if (i % 10 === 9 || i === total - 1) {
            self.postMessage({ type: 'optimize_progress', pct: ((i+1)/total*100)|0, id: msg.id });
          }
        }

        results.sort(function(a,b){ return b.score - a.score; });
        self.postMessage({ type: 'optimize_done', results: results.slice(0, 30), id: msg.id });
        break;
      }

      case 'batch': {
        var data    = msg.data;
        var config  = msg.config;
        var combos  = msg.combos;
        var target  = msg.target || 'cagr';
        var total   = combos.length;
        var results = [];

        for (var i = 0; i < total; i++) {
          var c = Object.assign({}, config, {
            longEntry: combos[i].entry,
            longExit:  combos[i].exit,
          });
          try {
            var r = runBacktestEngine(data, c);
            var score = getScore(r.metrics, target);
            // entry[0] 可能是 {id,params} 或 string，統一取 id
            var entryObj = combos[i].entry[0];
            var exitObj  = combos[i].exit[0];
            results.push({
              entry:       (entryObj && entryObj.id) ? entryObj.id : entryObj,
              entryParams: (entryObj && entryObj.params) ? entryObj.params : {},
              exit:        (exitObj  && exitObj.id)  ? exitObj.id  : exitObj,
              exitParams:  (exitObj  && exitObj.params)  ? exitObj.params  : {},
              metrics: r.metrics,
              score:   score,
            });
          } catch(e2) {}

          if (i % 5 === 4 || i === total - 1) {
            self.postMessage({ type: 'batch_progress', pct: ((i+1)/total*100)|0, id: msg.id });
          }
        }

        results.sort(function(a,b){ return b.score - a.score; });
        self.postMessage({ type: 'batch_done', results: results.slice(0, 50), id: msg.id });
        break;
      }

      default:
        self.postMessage({ type: 'error', message: 'Unknown message type: ' + msg.type, id: msg.id });
    }
  } catch(err) {
    self.postMessage({ type: 'error', message: err.message || String(err), id: msg.id });
  }
};

function getScore(metrics, target) {
  switch (target) {
    case 'cagr':    return metrics.cagr;
    case 'sharpe':  return metrics.sharpe;
    case 'sortino': return metrics.sortino;
    case 'calmar':  return metrics.calmar;
    case 'minDD':   return -metrics.maxDD;
    default:        return metrics.cagr;
  }
}

function generateParamGrid() {
  var params = [];
  [0, 3, 5, 7, 8, 10, 12, 15, 20].forEach(function(sl) {
    [0, 10, 15, 20, 25, 30, 40, 50, 75, 100].forEach(function(sp) {
      if (sp === 0 || sp > sl * 1.2) {
        params.push({ stopLoss: sl, stopProfit: sp });
      }
    });
  });
  return params;
}

<script>
// bt/storage.js — BacktestStorageManager v4.0
"use strict";

var BacktestStorage = (function() {

  var SCHEMA_VERSION = '4.0';
  var PREFIX = 'bt_v4_';
  var MAX_SNAPSHOTS = 10;

  // ── 壓縮（簡易 RLE for equity array）──────────────────────
  function compressEquity(equity, dates) {
    // 每 5 筆取 1，並只保留整數
    var eq = [];
    var dt = [];
    for (var i = 0; i < equity.length; i += 5) {
      eq.push(Math.round(equity[i]));
      if (dates) dt.push(dates[i]);
    }
    return { eq: eq, dt: dt };
  }

  // ── Schema 版本檢查 ────────────────────────────────────────
  function checkVersion(raw) {
    try {
      var obj = JSON.parse(raw);
      return obj && obj._schemaVersion === SCHEMA_VERSION ? obj : null;
    } catch(e) { return null; }
  }

  // ── save ──────────────────────────────────────────────────
  function saveLastResult(result, data, config) {
    try {
      var compressed = compressEquity(result.equity, data ? data.dates : null);
      var snapshot = {
        _schemaVersion: SCHEMA_VERSION,
        _ts: Date.now(),
        _code: config.code || (data && data.code) || 'unknown',
        config:  config,
        metrics: result.metrics,
        trades:  result.trades,
        annual:  result.annual,
        equity:  compressed.eq,
        dates:   compressed.dt,
      };
      var raw = JSON.stringify(snapshot);
      // localStorage quota protection
      try {
        localStorage.setItem(PREFIX + 'last', raw);
      } catch(quotaErr) {
        // Quota exceeded: clear old data and retry once
        try {
          localStorage.removeItem(PREFIX + 'last');
          localStorage.removeItem(PREFIX + 'opt');
          localStorage.removeItem(PREFIX + 'batch');
          localStorage.setItem(PREFIX + 'last', raw);
        } catch(e2) {
          console.warn('[Storage] localStorage full, cannot save result');
        }
      }

      // 快照歷史
      var hist = loadHistory();
      hist.unshift({
        ts:     snapshot._ts,
        code:   snapshot._code,
        cagr:   result.metrics.cagr,
        sharpe: result.metrics.sharpe,
        maxDD:  result.metrics.maxDD,
      });
      if (hist.length > MAX_SNAPSHOTS) hist = hist.slice(0, MAX_SNAPSHOTS);
      localStorage.setItem(PREFIX + 'history', JSON.stringify(hist));

      return true;
    } catch(e) {
      console.warn('[Storage] saveLastResult failed:', e.message);
      return false;
    }
  }

  function loadLastResult() {
    try {
      var raw = localStorage.getItem(PREFIX + 'last');
      if (!raw) return null;
      return checkVersion(raw);
    } catch(e) { return null; }
  }

  // ── strategies ────────────────────────────────────────────
  function saveStrategy(entry) {
    try {
      var list = loadStrategies();
      entry._schemaVersion = SCHEMA_VERSION;
      entry._ts = Date.now();
      var idx = list.findIndex(function(s){ return s.name === entry.name; });
      if (idx >= 0) list[idx] = entry; else list.push(entry);
      localStorage.setItem(PREFIX + 'strategies', JSON.stringify(list));
      return true;
    } catch(e) { return false; }
  }

  function loadStrategies() {
    try {
      var raw = localStorage.getItem(PREFIX + 'strategies');
      if (!raw) return [];
      var list = JSON.parse(raw);
      return Array.isArray(list) ? list.filter(function(s){ return s._schemaVersion === SCHEMA_VERSION; }) : [];
    } catch(e) { return []; }
  }

  function deleteStrategy(name) {
    var list = loadStrategies().filter(function(s){ return s.name !== name; });
    localStorage.setItem(PREFIX + 'strategies', JSON.stringify(list));
  }

  function loadHistory() {
    try {
      var raw = localStorage.getItem(PREFIX + 'history');
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }

  // ── optimize / batch results ──────────────────────────────
  function saveOptResult(results, config) {
    try {
      localStorage.setItem(PREFIX + 'opt', JSON.stringify({
        _schemaVersion: SCHEMA_VERSION, _ts: Date.now(),
        config: config, results: results.slice(0, 30)
      }));
    } catch(e) {}
  }

  function loadOptResult() {
    try {
      var raw = localStorage.getItem(PREFIX + 'opt');
      return raw ? checkVersion(raw) : null;
    } catch(e) { return null; }
  }

  function saveBatchResult(results) {
    try {
      localStorage.setItem(PREFIX + 'batch', JSON.stringify({
        _schemaVersion: SCHEMA_VERSION, _ts: Date.now(), results: results.slice(0, 50)
      }));
    } catch(e) {}
  }

  function loadBatchResult() {
    try {
      var raw = localStorage.getItem(PREFIX + 'batch');
      return raw ? checkVersion(raw) : null;
    } catch(e) { return null; }
  }

  // ── cleanup ───────────────────────────────────────────────
  function cleanup() {
    // 清除舊版 schema 的資料
    var oldPrefixes = ['bt_', 'bt_v2_', 'bt_v3_'];
    oldPrefixes.forEach(function(p) {
      Object.keys(localStorage).forEach(function(k) {
        if (k.startsWith(p) && !k.startsWith(PREFIX)) {
          try { localStorage.removeItem(k); } catch(e) {}
        }
      });
    });
  }

  // ── export ────────────────────────────────────────────────
  function exportFullJSON(result, data, config) {
    return JSON.stringify({
      _schemaVersion: SCHEMA_VERSION,
      _exportTime: new Date().toISOString(),
      config:  config,
      metrics: result.metrics,
      trades:  result.trades,
      annual:  result.annual,
      equity:  result.equity.filter(function(_,i){return i%5===0;}).map(Math.round),
      dates:   (data && data.dates ? data.dates : []).filter(function(_,i){return i%5===0;}),
    }, null, 2);
  }

  function exportTradesCSV(result) {
    var rows = ['\uFEFF日期,方向,備註,進場價,出場價,張數,淨損益(元),損益%,進場日期'];
    (result.trades || []).filter(function(t){return t.type==='exit';}).forEach(function(t) {
      rows.push([
        t.exitDate||t.date||'', t.side==='long'?'多單':'空單', t.reason||'',
        t.entryPrice.toFixed(2), t.exitPrice.toFixed(2),
        t.qty, Math.round(t.netPnl), t.pnlPct.toFixed(2)+'%', t.entryDate||''
      ].join(','));
    });
    return rows.join('\r\n');
  }

  function exportEquityCSV(result, dates) {
    var rows = ['\uFEFF日期,淨值,報酬率%'];
    var eq   = result.equity;
    var init = eq[0] || result.metrics.initCapital || 1;
    // large file protection：超過 5000 筆每 2 筆取 1
    var step = eq.length > 5000 ? 2 : 1;
    for (var i = 0; i < eq.length; i += step) {
      var v = eq[i];
      if (!isFinite(v)) v = init;
      rows.push([(dates&&dates[i])||i, Math.round(v), ((v-init)/Math.max(init,1)*100).toFixed(2)].join(','));
    }
    return rows.join('\r\n');
  }

  // 執行 cleanup 於初始化
  cleanup();

  return {
    saveLastResult, loadLastResult,
    saveStrategy, loadStrategies, deleteStrategy, loadHistory,
    saveOptResult, loadOptResult,
    saveBatchResult, loadBatchResult,
    exportFullJSON, exportTradesCSV, exportEquityCSV,
    SCHEMA_VERSION,
  };
})();

</script>
