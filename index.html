<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股分析站</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{--bg:#0a0c10;--bg2:#0f1318;--bg3:#141820;--bg4:#1a2030;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text1:#e8edf5;--text2:#8892a4;--text3:#4a5568;--accent:#3b82f6;--accent2:#60a5fa;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316;--shadow:0 1px 3px rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.3)}
[data-theme="light"]{--bg:#f5f7fa;--bg2:#ffffff;--bg3:#f0f2f5;--bg4:#e8ecf2;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);--text1:#111827;--text2:#6b7280;--text3:#9ca3af;--accent:#2563eb;--accent2:#3b82f6;--green:#16a34a;--red:#dc2626;--yellow:#d97706;--orange:#ea580c;--shadow:0 1px 3px rgba(0,0,0,.1),0 4px 16px rgba(0,0,0,.06)}
html{font-size:15px}
body{background:var(--bg);color:var(--text1);font-family:"Noto Sans TC",sans-serif;min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.hdr{position:sticky;top:0;z-index:200;background:var(--bg2);border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
.hdr-inner{max-width:1080px;margin:0 auto;height:56px;display:flex;align-items:center;gap:14px;padding:0 20px}
.logo{font-family:"IBM Plex Mono",monospace;font-size:15px;font-weight:700;color:var(--text1);white-space:nowrap;flex-shrink:0}
.logo span{color:var(--accent)}
.search-wrap{flex:1;max-width:440px;position:relative}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text1);font-family:"IBM Plex Mono",monospace;font-size:13px;padding:9px 14px;border-radius:6px;outline:none;transition:border-color .2s,box-shadow .2s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.search-input::placeholder{color:var(--text3)}
.ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.3);max-height:280px;overflow-y:auto;display:none;z-index:300}
.ac-list.show{display:block}
.ac-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.ac-item:last-child{border:none}
.ac-item:hover,.ac-item.active{background:var(--bg3)}
.ac-code{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;color:var(--accent);min-width:48px}
.ac-name{font-size:13px;color:var(--text1)}
.ac-type{font-size:11px;color:var(--text3);margin-left:auto}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:6px;font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.btn-icon{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:34px;height:34px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-icon:hover{border-color:var(--border2);color:var(--text1)}
.btn-scan{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:7px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all .2s}
.btn-scan:hover,.btn-scan.active{border-color:var(--orange);color:var(--orange)}
.hots-bar{background:var(--bg2);border-bottom:1px solid var(--border)}
.hots-inner{max-width:1080px;margin:0 auto;height:38px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none;padding:0 20px}
.hots-inner::-webkit-scrollbar{display:none}
.hot-chip{flex-shrink:0;background:none;border:1px solid var(--border);color:var(--text3);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;transition:all .15s}
.hot-chip:hover,.hot-chip.on{border-color:var(--accent2);color:var(--accent2);background:rgba(59,130,246,.07)}
.scan-panel{background:var(--bg2);border-bottom:1px solid var(--border);display:none;padding:14px 20px}
.scan-panel.open{display:block}
.scan-inner{max-width:1080px;margin:0 auto}
.scan-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.mode-chip{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:5px 12px;border-radius:4px;cursor:pointer;transition:all .15s}
.mode-chip.on{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.08)}
.scan-n-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.scan-n-wrap input{width:52px;background:var(--bg3);border:1px solid var(--border);color:var(--text1);font-family:"IBM Plex Mono",monospace;font-size:12px;padding:5px 8px;border-radius:4px;text-align:center;outline:none}
.scan-table{width:100%;border-collapse:collapse;font-size:12px}
.scan-table th{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:500;color:var(--text3);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);letter-spacing:.05em}
.scan-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.scan-table tr:last-child td{border:none}
.scan-table tr:hover td{background:var(--bg3)}
.scan-code{font-family:"IBM Plex Mono",monospace;font-weight:600;color:var(--accent)}
.scan-suggest{color:var(--text2);font-size:11px;line-height:1.4}
.btn-deep{background:var(--bg4);border:1px solid var(--border2);color:var(--text1);font-family:"IBM Plex Mono",monospace;font-size:10px;padding:4px 10px;border-radius:4px;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-deep:hover{border-color:var(--accent);color:var(--accent)}
.scan-msg{padding:20px;text-align:center;color:var(--text3);font-family:"IBM Plex Mono",monospace;font-size:12px}
.main{max-width:1080px;margin:0 auto;padding:20px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;gap:16px}
.welcome-logo{font-family:"IBM Plex Mono",monospace;font-size:48px;font-weight:700;color:var(--text1)}
.welcome-logo span{color:var(--accent)}
.welcome-sub{font-size:14px;color:var(--text2);line-height:1.8}
.welcome-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:480px;width:100%;margin-top:8px}
.welcome-chip{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;cursor:pointer;text-align:left;transition:all .2s}
.welcome-chip:hover{border-color:var(--accent);background:var(--bg3)}
.welcome-chip .wc{font-family:"IBM Plex Mono",monospace;font-size:14px;font-weight:600;color:var(--accent)}
.welcome-chip .wn{font-size:11px;color:var(--text3);margin-top:2px}
.loader{display:none;flex-direction:column;align-items:center;padding:60px 20px;gap:16px}
.loader.show{display:flex}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-steps{display:flex;flex-direction:column;gap:8px}
.loader-step{display:flex;align-items:center;gap:8px;font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--text3)}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.loader-step.active{color:var(--accent)}
.loader-step.active .step-dot{background:var(--accent);animation:pulse 1s infinite}
.loader-step.done .step-dot{background:var(--green)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
.err-box{display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;color:var(--red);font-family:"IBM Plex Mono",monospace;font-size:12px}
.hero{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;box-shadow:var(--shadow);margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--green))}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.hero-code{font-family:"IBM Plex Mono",monospace;font-size:22px;font-weight:700;color:var(--text1);letter-spacing:.05em}
.hero-name{font-size:14px;color:var(--text2);margin-top:3px}
.hero-meta{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--text3);margin-top:4px}
.hero-price{font-family:"IBM Plex Mono",monospace;font-size:36px;font-weight:700;line-height:1;text-align:right}
.hero-chg{font-family:"IBM Plex Mono",monospace;font-size:13px;margin-top:4px;text-align:right}
.up{color:var(--green)}.dn{color:var(--red)}.neu{color:var(--text2)}
.score-bars{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.score-bar{background:var(--bg3);border-radius:6px;padding:10px 12px}
.bar-label{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--text3);margin-bottom:6px;letter-spacing:.05em}
.bar-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:5px}
.bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.bar-fill.bull{background:var(--green)}.bar-fill.bear{background:var(--red)}.bar-fill.neutral{background:var(--accent)}
.bar-vals{display:flex;justify-content:space-between;font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--text3)}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px;border:1px solid}
.tag-bull{color:var(--green);border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.07)}
.tag-bear{color:var(--red);border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.07)}
.tag-neutral{color:var(--text2);border-color:var(--border2);background:var(--bg3)}
.tag-warn{color:var(--yellow);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.07)}
.tag-hot{color:var(--orange);border-color:rgba(249,115,22,.3);background:rgba(249,115,22,.07)}
.tabs-wrap{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab-btn{flex:1;background:none;border:none;color:var(--text3);font-family:"Noto Sans TC",sans-serif;font-size:12px;padding:7px 8px;border-radius:5px;cursor:pointer;white-space:nowrap;text-align:center;transition:all .15s}
.tab-btn:hover{color:var(--text1)}
.tab-btn.on{background:var(--bg4);color:var(--accent);box-shadow:var(--shadow)}
.tab-pane{display:none;flex-direction:column;gap:10px}
.tab-pane.on{display:flex}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:var(--shadow)}
.card-title{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.ai-block{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.ai-block::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--green),var(--orange))}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ai-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite}
.ai-title-txt{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.1em}
.ai-text{font-size:13px;line-height:1.9;color:var(--text1)}
.ai-text strong{color:var(--green);font-weight:600}
.verdict{border-radius:8px;padding:16px;border:1px solid var(--border);box-shadow:var(--shadow)}
.verdict.bull{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04)}
.verdict.bear{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04)}
.verdict.neut{background:var(--bg2)}
.verdict-title{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--accent);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border2);font-weight:500;letter-spacing:.05em}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.data-table tr:last-child td{border:none}
.links{display:flex;flex-wrap:wrap;gap:6px}
.link-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--accent);font-family:"IBM Plex Mono",monospace;font-size:11px;padding:6px 12px;border-radius:5px;text-decoration:none;transition:all .15s}
.link-btn:hover{border-color:var(--accent);background:var(--bg4)}
.note{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--text3);text-align:center;line-height:1.8;padding-top:4px}
.pdf-btn-float{display:none;position:fixed;bottom:24px;right:24px;z-index:100}
.pdf-btn-float button{background:var(--green);color:#fff;border:none;padding:11px 20px;border-radius:8px;font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(34,197,94,.35);transition:all .2s}
.pdf-btn-float button:hover{transform:translateY(-1px)}
@media print{
  .hdr,.hots-bar,.scan-panel,.tabs-wrap,.links,.note,.pdf-btn-float{display:none !important}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  body{background:white !important;color:#111 !important}
  .main{padding:0 !important;max-width:100% !important}
  .tab-pane{display:flex !important}
  .tab-pane>.card:first-child,.tab-pane>.ai-block:first-child{break-before:page;page-break-before:always}
  .tab-pane:first-of-type>.card:first-child{break-before:avoid !important}
  .card,.ai-block,.verdict,.hero{border:1px solid #ddd !important;background:white !important;break-inside:avoid;margin-bottom:8px !important;box-shadow:none !important}
  .ai-text,.card-title{color:#111 !important}
  .up{color:#16a34a !important}.dn{color:#dc2626 !important}
  @page{margin:12mm 10mm;size:A4}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease both}
@media(max-width:600px){.welcome-grid{grid-template-columns:repeat(2,1fr)}.score-bars{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-inner">
    <div class="logo">台股<span>.</span>AI</div>
    <div class="search-wrap">
      <input class="search-input" id="inp" placeholder="輸入代號或名稱，如 2330 / 台積電" maxlength="20" autocomplete="off">
      <div class="ac-list" id="acList"></div>
    </div>
    <button class="btn-primary" id="sbtn">分析</button>
    <div class="hdr-right">
      <button class="btn-scan" id="scanOpenBtn" onclick="toggleScan()">熱門掃描</button>
      <button class="btn-icon" id="themeBtn" onclick="toggleTheme()" title="切換主題">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </div>
</header>
<div class="hots-bar"><div class="hots-inner" id="hots"></div></div>
<div class="scan-panel" id="scanPanel">
  <div class="scan-inner">
    <div class="scan-controls">
      <button class="mode-chip on" id="modeVol" onclick="setMode('volume')">成交量排行</button>
      <button class="mode-chip" id="modeChg" onclick="setMode('change')">漲幅排行</button>
      <div class="scan-n-wrap">前 <input type="number" id="scanN" value="20" min="5" max="30"> 名</div>
      <button class="btn-primary" id="scanRunBtn" onclick="runScan()" style="margin-left:auto;font-size:11px;padding:7px 14px">開始掃描</button>
    </div>
    <div id="scanResult"></div>
  </div>
</div>
<div class="main">
  <div class="err-box" id="errbox"></div>
  <div class="welcome" id="welcome">
    <div class="welcome-logo">台股<span>.</span>AI</div>
    <div class="welcome-sub">輸入任意台股代號，即時抓取資料<br>生成完整專業分析報告</div>
    <div class="welcome-grid" id="wbtns"></div>
  </div>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="loader-steps">
      <div class="loader-step active" id="st1"><div class="step-dot"></div><span>抓取即時資料...</span></div>
      <div class="loader-step" id="st2"><div class="step-dot"></div><span>計算技術指標...</span></div>
      <div class="loader-step" id="st3"><div class="step-dot"></div><span>生成分析報告...</span></div>
    </div>
    <div class="loader-count" id="ldcount"></div>
  </div>
  <div id="result"></div>
</div>
<div class="pdf-btn-float" id="pdfBar"><button onclick="downloadPDF()">下載 PDF 報告</button></div>
<script>
window.RENDER_URL = "https://taiwan-stock-api-lm71.onrender.com";
var HOTS = [
  {c:"2330",n:"台積電"},{c:"2317",n:"鴻海"},{c:"2454",n:"聯發科"},
  {c:"2308",n:"台達電"},{c:"2603",n:"長榮"},{c:"3008",n:"大立光"},
  {c:"2412",n:"中華電"},{c:"2882",n:"國泰金"},{c:"00878",n:"國泰永續"},
  {c:"1301",n:"台塑"},{c:"3711",n:"日月光"},{c:"2891",n:"中信金"}
];
var TABS = ["行情","技術","短中長線","籌碼","基本面","風險","策略"];

function toggleTheme() {
  var html = document.documentElement;
  var isDark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", isDark ? "light" : "dark");
  localStorage.setItem("theme", isDark ? "light" : "dark");
  document.getElementById("themeIcon").innerHTML = isDark
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
}
(function(){
  var s = localStorage.getItem("theme");
  if (s) { document.documentElement.setAttribute("data-theme",s); if(s==="light") { var el=document.getElementById("themeIcon"); if(el) el.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'; } }
})();

var hotsEl=document.getElementById("hots"), wbtnsEl=document.getElementById("wbtns");
HOTS.forEach(function(h){
  var b=document.createElement("button"); b.className="hot-chip"; b.textContent=h.c;
  b.onclick=function(){document.getElementById("inp").value=h.c;doSearch(h.c);}; hotsEl.appendChild(b);
  var w=document.createElement("div"); w.className="welcome-chip";
  w.innerHTML='<div class="wc">'+h.c+'</div><div class="wn">'+h.n+'</div>';
  w.onclick=function(){document.getElementById("inp").value=h.c;doSearch(h.c);}; wbtnsEl.appendChild(w);
});

var acTimer=null, acActive=-1;
document.getElementById("inp").addEventListener("input",function(){
  var q=this.value.trim(); clearTimeout(acTimer); acActive=-1;
  if(!q){hideAC();return;} acTimer=setTimeout(function(){fetchAC(q);},200);
});
document.getElementById("inp").addEventListener("keydown",function(e){
  var items=document.querySelectorAll(".ac-item");
  if(e.key==="ArrowDown"){e.preventDefault();acActive=Math.min(acActive+1,items.length-1);items.forEach(function(el,i){el.classList.toggle("active",i===acActive);});}
  else if(e.key==="ArrowUp"){e.preventDefault();acActive=Math.max(acActive-1,-1);items.forEach(function(el,i){el.classList.toggle("active",i===acActive);});}
  else if(e.key==="Enter"){if(acActive>=0&&items[acActive])items[acActive].click();else doSearch();}
  else if(e.key==="Escape"){hideAC();}
});
document.addEventListener("click",function(e){if(!e.target.closest(".search-wrap"))hideAC();});
function fetchAC(q){
  fetch(window.RENDER_URL+"/search?q="+encodeURIComponent(q))
    .then(function(r){return r.json();})
    .then(function(list){
      if(!list||!list.length){hideAC();return;}
      var acList=document.getElementById("acList"); acList.innerHTML="";
      list.forEach(function(s){
        var el=document.createElement("div"); el.className="ac-item";
        el.innerHTML='<span class="ac-code">'+(s.code||"")+'</span><span class="ac-name">'+(s.name||"")+'</span><span class="ac-type">'+(s.type||"")+'</span>';
        el.onclick=function(){selectAC(s.code,s.name);}; acList.appendChild(el);
      });
      acList.classList.add("show"); acActive=-1;
    }).catch(function(){hideAC();});
}
function selectAC(code,name){document.getElementById("inp").value=code;hideAC();doSearch(code);}
function hideAC(){document.getElementById("acList").classList.remove("show");acActive=-1;}

var scanMode="volume", scanOpen=false;
function toggleScan(){
  scanOpen=!scanOpen;
  document.getElementById("scanPanel").classList.toggle("open",scanOpen);
  document.getElementById("scanOpenBtn").classList.toggle("active",scanOpen);
  document.getElementById("scanOpenBtn").textContent=scanOpen?"關閉掃描":"熱門掃描";
}
function setMode(m){
  scanMode=m;
  document.getElementById("modeVol").classList.toggle("on",m==="volume");
  document.getElementById("modeChg").classList.toggle("on",m==="change");
}
function runScan(){
  var n=parseInt(document.getElementById("scanN").value)||20;
  var btn=document.getElementById("scanRunBtn");
  btn.disabled=true; btn.textContent="掃描中...";
  document.getElementById("scanResult").innerHTML='<div class="scan-msg">正在分析前'+n+'大熱門股，約需 15~30 秒...</div>';
  fetch(window.RENDER_URL+"/scan?mode="+scanMode+"&limit="+n)
    .then(function(r){return r.json();})
    .then(function(data){
      btn.disabled=false; btn.textContent="開始掃描";
      if(data.error){document.getElementById("scanResult").innerHTML='<div class="scan-msg" style="color:var(--red)">'+data.error+'</div>';return;}
      renderScan(data.stocks);
    }).catch(function(){btn.disabled=false;btn.textContent="開始掃描";document.getElementById("scanResult").innerHTML='<div class="scan-msg" style="color:var(--red)">掃描失敗，請重試</div>';});
}
function renderScan(stocks){
  if(!stocks||!stocks.length){document.getElementById("scanResult").innerHTML='<div class="scan-msg">無資料</div>';return;}
  var wrap=document.createElement("div"); wrap.style.overflowX="auto";
  var table=document.createElement("table"); table.className="scan-table";
  table.innerHTML='<thead><tr><th>代號</th><th>名稱</th><th>股價</th><th>漲跌</th><th>方向</th><th>RSI</th><th>建議</th><th></th></tr></thead>';
  var tbody=document.createElement("tbody");
  stocks.forEach(function(s){
    var tr=document.createElement("tr"); tr.style.cursor="pointer";
    var chgPct=parseFloat(s.changePct)||0;
    var chgCls=chgPct>0?"up":chgPct<0?"dn":"neu";
    var dirCls=s.direction==="偏多"?"up":s.direction==="偏空"?"dn":"neu";
    tr.innerHTML='<td class="scan-code">'+s.code+'</td><td>'+s.name+'</td>'
      +'<td class="'+chgCls+'" style="font-family:IBM Plex Mono,monospace">'+s.price+'</td>'
      +'<td class="'+chgCls+'" style="font-family:IBM Plex Mono,monospace">'+(s.changePct||"—")+'</td>'
      +'<td class="'+dirCls+'" style="font-family:IBM Plex Mono,monospace;font-size:11px">'+(s.direction||"—")+'</td>'
      +'<td style="font-family:IBM Plex Mono,monospace">'+(s.rsi||"—")+'</td>'
      +'<td class="scan-suggest">'+(s.suggestion||"觀察中")+'</td>'
      +'<td><button class="btn-deep">深入分析</button></td>';
    tr.onclick=function(){deepAnalyze(s.code);};
    tr.querySelector(".btn-deep").onclick=function(e){e.stopPropagation();deepAnalyze(s.code);};
    tbody.appendChild(tr);
  });
  table.appendChild(tbody); wrap.appendChild(table);
  document.getElementById("scanResult").innerHTML=""; document.getElementById("scanResult").appendChild(wrap);
}
function deepAnalyze(code){document.getElementById("inp").value=code;if(scanOpen)toggleScan();doSearch(code);window.scrollTo({top:0,behavior:"smooth"});}

document.getElementById("sbtn").onclick=function(){doSearch();};
document.getElementById("inp").onkeydown=function(e){if(e.key==="Enter")doSearch();};

function doSearch(code){
  var c=(code||document.getElementById("inp").value).trim().replace(/\s/g,"");
  if(!c)return;
  document.getElementById("welcome").style.display="none";
  document.getElementById("errbox").style.display="none";
  document.getElementById("result").innerHTML="";
  document.getElementById("loader").classList.add("show");
  document.getElementById("sbtn").disabled=true; document.getElementById("sbtn").textContent="分析中...";
  document.getElementById("pdfBar").style.display="none";
  setStep(1);
  document.querySelectorAll(".hot-chip").forEach(function(b){b.classList.toggle("on",b.textContent===c);});
  fetch(window.RENDER_URL+"/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:c})})
    .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t||"API 錯誤 "+r.status);});return r.json();})
    .then(function(data){
      document.getElementById("loader").classList.remove("show");
      if(data.error)throw new Error(data.error);
      renderReport(c,data.text||"");
      document.getElementById("pdfBar").style.display="block";
      document.getElementById("sbtn").disabled=false; document.getElementById("sbtn").textContent="分析";
    }).catch(function(e){
      document.getElementById("loader").classList.remove("show");
      var eb=document.getElementById("errbox"); eb.textContent=e.message||"發生錯誤，請重試"; eb.style.display="block";
      document.getElementById("sbtn").disabled=false; document.getElementById("sbtn").textContent="分析";
    });
  setTimeout(function(){setStep(2);},8000);
  setTimeout(function(){setStep(3);},20000);
}

function setStep(n){
  ["st1","st2","st3"].forEach(function(id,i){
    var el=document.getElementById(id);
    el.className="loader-step "+(i+1<n?"done":i+1===n?"active":"");
  });
}

function parseSection(text,tag){
  if(!text)return"";
  var escaped=tag.replace(/[.*+?^${}()|[\]\]/g,"\$&");
  var startReg=new RegExp("===\s*"+escaped+"[^\n]*\n","i");
  var startMatch=text.match(startReg);
  if(!startMatch){startReg=new RegExp("#{1,4}\s*"+escaped+"[^\n]*\n","i");startMatch=text.match(startReg);}
  if(!startMatch)return"";
  var startIdx=startMatch.index+startMatch[0].length;
  var rest=text.slice(startIdx);
  var nextMatch=rest.match(/(?:===\s*\S|#{1,4}\s+\S)/);
  return(nextMatch?rest.slice(0,nextMatch.index):rest).trim();
}

function richHTML(text){
  if(!text)return'<span style="color:var(--text3);font-family:IBM Plex Mono,monospace;font-size:12px">資料生成中...</span>';
  var t=text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/^={3,}\s*$/gm,"").replace(/^-{3,}\s*$/gm,"").replace(/^#{1,4}\s*$/gm,"")
    .replace(/(
){3,}/g,"

").trim();
  var lines=t.split("
"),out=[],inTable=false,isFirst=false;
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(line.startsWith("|")&&line.endsWith("|")){
      if(/^[|\-\s:]+$/.test(line)){isFirst=false;continue;}
      if(!inTable){while(out.length&&out[out.length-1]==="")out.pop();out.push('<table class="data-table">');inTable=true;isFirst=true;}
      var cells=line.split("|").slice(1,-1);
      var t2=isFirst?"th":"td";
      out.push("<tr>"+cells.map(function(c){return"<"+t2+">"+c.trim()+"</"+t2+">";}).join("")+"</tr>");
      isFirst=false;
    }else{if(inTable){out.push("</table>");inTable=false;}out.push(lines[i]);}
  }
  if(inTable)out.push("</table>");
  return out.join("
")
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/【(.*?)】/g,'<strong>【$1】</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm,'<strong style="color:var(--accent)">$1</strong>')
    .replace(/
/g,"<br>").replace(/(<br>){3,}/g,"<br><br>")
    .replace(/<br>(<table)/g,"$1").replace(/(<\/table>)<br>/g,"$1");
}

function switchTab(idx){
  document.querySelectorAll(".tab-btn").forEach(function(b,i){b.classList.toggle("on",i===idx);});
  ["tp0","tp1","tp2","tp3","tp4","tp5","tp6"].forEach(function(id,i){var el=document.getElementById(id);if(el)el.classList.toggle("on",i===idx);});
}

function downloadPDF(){
  var code=document.getElementById("inp").value||"";
  var d=new Date();
  var dateStr=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  document.querySelectorAll(".tab-pane").forEach(function(p){p.style.display="flex";});
  var tabNames=["行情總覽","技術分析","短中長線","籌碼分析","基本面","風險分析","操作策略"];
  document.querySelectorAll(".tab-pane").forEach(function(p,i){
    if(!p.querySelector(".pdf-tab-title")&&tabNames[i]){
      var title=document.createElement("div"); title.className="pdf-tab-title";
      title.style.cssText="font-size:13px;font-weight:bold;color:#2563eb;border-bottom:2px solid #2563eb;padding-bottom:5px;margin-bottom:12px;font-family:IBM Plex Mono,monospace";
      title.textContent=tabNames[i]; p.insertBefore(title,p.firstChild);
    }
  });
  var origTitle=document.title; document.title=code+"_台股分析報告_"+dateStr;
  window.print();
  setTimeout(function(){document.title=origTitle;document.querySelectorAll(".pdf-tab-title").forEach(function(el){el.remove();});switchTab(0);},1000);
}
